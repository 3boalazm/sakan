<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>سكن</title>
<script>(function(){try{var t=localStorage.getItem('sakan_theme')||'light';document.documentElement.setAttribute('data-theme',['light','dark','oled'].indexOf(t)>=0?t:'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ── Thmanyah fonts — served same-origin from /fonts ── */
  @font-face{font-family:'ThmanyahSans';src:url('/fonts/thmanyahsans-Regular.otf') format('opentype');font-weight:400;font-display:swap}
  @font-face{font-family:'ThmanyahSans';src:url('/fonts/thmanyahsans-Bold.otf') format('opentype');font-weight:700;font-display:swap}
  @font-face{font-family:'ThmanyahSans';src:url('/fonts/thmanyahsans-Black.otf') format('opentype');font-weight:900;font-display:swap}
  @font-face{font-family:'ThmanyahSerifDisplay';src:url('/fonts/thmanyahserifdisplay-Bold.otf') format('opentype');font-weight:700;font-display:swap}

  :root{
    --brand-deep:#0e3b2e; --brand-mid:#1a5d47; --brand-soft:#2a7a5f; --brand-gold:#c9a14a; --brand-gold-lt:#e6c97a;
    --bg:#faf6ec; --surface:#ffffff; --card-2:#f7f3ea; --sand:#f5ecd9; --sand-2:#ebdfc4;
    --green-pale:#e8f4ef; --gold-pale:#fdf5e0;
    --ink:#10241d; --muted:#56635c; --muted-2:#7c8c7e;
    --primary:#1a5d47; --primary-ink:#0e3b2e; --primary-soft:#e8f4ef;
    --accent:#c9a14a; --accent-soft:#fdf5e0; --accent-ink:#8a6822;
    --field-bg:#fcfbf9; --line:rgba(14,59,46,.10);
    --radius:18px; --radius-sm:12px;
    --shadow:0 10px 30px -12px rgba(14,59,46,.18); --shadow-sm:0 4px 14px -6px rgba(14,59,46,.12); --shadow-gold:0 8px 24px -8px rgba(201,161,74,.35);
    --t:.25s; --ease:cubic-bezier(.4,0,.2,1); --header-bg:rgba(250,246,236,.82);
  }
  html[data-theme="dark"]{
    --bg:#0a0f0c; --surface:#111a14; --card-2:#162019; --sand:#1c2a1e; --sand-2:#1a2618;
    --green-pale:#0d1f12; --gold-pale:#1a1608;
    --ink:#d8ead8; --muted:#7a9a7a; --muted-2:#4a6a4a;
    --primary:#3dcc5e; --primary-ink:#4dd866; --primary-soft:rgba(77,216,102,.12);
    --accent:#e6c97a; --accent-soft:rgba(230,201,122,.12); --accent-ink:#e6c97a;
    --field-bg:#162019; --line:rgba(255,255,255,.08);
    --shadow:0 10px 30px -12px rgba(0,0,0,.6); --shadow-sm:0 4px 14px -6px rgba(0,0,0,.4); --shadow-gold:0 8px 24px -8px rgba(0,0,0,.5);
    --header-bg:rgba(10,15,12,.82);
  }
  html[data-theme="oled"]{
    --bg:#000000; --surface:#0a0a0a; --card-2:#101010; --sand:#080808; --sand-2:#0d0d0d;
    --green-pale:#040a05; --gold-pale:#0a0800;
    --ink:#f5fef6; --muted:#b8cfba; --muted-2:#7a9a7c;
    --primary:#3dcc5e; --primary-ink:#4dd866; --primary-soft:rgba(77,216,102,.12);
    --accent:#f0d080; --accent-soft:rgba(240,208,128,.12); --accent-ink:#f0d080;
    --field-bg:#101010; --line:rgba(255,255,255,.10);
    --shadow:0 10px 30px -12px rgba(0,0,0,.85); --shadow-sm:0 4px 14px -6px rgba(0,0,0,.7); --shadow-gold:0 8px 24px -8px rgba(0,0,0,.7);
    --header-bg:rgba(0,0,0,.82);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'ThmanyahSans','Tajawal','Segoe UI',system-ui,sans-serif; font-weight:400; line-height:1.75;
    -webkit-font-smoothing:antialiased; transition:background var(--t) var(--ease), color var(--t) var(--ease);
  }
  .display{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif}
  .wrap{max-width:720px; margin:0 auto; padding:0 20px 90px}
  a{color:var(--primary); text-decoration:none}

  header{position:sticky; top:0; z-index:10; background:var(--header-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--line)}
  .bar{max-width:720px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px}
  .mark{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-weight:700; font-size:27px; color:var(--primary-ink); letter-spacing:.5px}
  .mark small{font-family:'ThmanyahSans','Tajawal',sans-serif; font-weight:300; font-size:12px; color:var(--muted); display:block; margin-top:-2px; letter-spacing:0}
  .bar-actions{display:flex; align-items:center; gap:10px; font-size:13px; color:var(--muted); flex-wrap:wrap; justify-content:flex-end}
  .chip{background:var(--green-pale); color:var(--primary-ink); border-radius:999px; padding:5px 12px; font-size:12.5px; font-weight:500; border:1px solid var(--line)}
  .linkbtn{background:none; border:none; color:var(--muted); cursor:pointer; font:inherit; font-size:13px}
  .linkbtn:hover{color:var(--ink)}
  .themesw{display:inline-flex; gap:2px; background:var(--card-2); border:1px solid var(--line); border-radius:999px; padding:3px}
  .themesw button{font:inherit; font-size:13px; line-height:1; border:none; background:none; cursor:pointer; width:30px; height:26px; border-radius:999px; color:var(--muted); display:grid; place-items:center; transition:background .15s}
  .themesw button.on{background:var(--surface); box-shadow:var(--shadow-sm)}

  h1{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-weight:700; font-size:31px; margin:30px 0 6px; line-height:1.3; color:var(--ink)}
  h2{font-family:'ThmanyahSans','Tajawal',sans-serif; font-weight:900; font-size:21px; margin:0 0 14px; color:var(--ink)}
  .lede{color:var(--muted); margin:0 0 26px; font-weight:300}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:16px; transition:background var(--t) var(--ease), border-color var(--t) var(--ease)}
  .card.tight{padding:16px 18px}
  .eyebrow{font-size:11.5px; letter-spacing:1.5px; color:var(--accent-ink); text-transform:uppercase; font-weight:700; margin-bottom:8px}

  label{display:block; font-size:13.5px; color:var(--muted); margin:0 0 7px}
  input[type=text], textarea, .field{
    width:100%; font:inherit; color:var(--ink); background:var(--field-bg);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; outline:none; transition:border-color .15s, box-shadow .15s;
  }
  textarea{resize:vertical; min-height:84px}
  input:focus, textarea:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .row{margin-bottom:14px}
  button.btn{
    font:inherit; font-weight:700; cursor:pointer; border-radius:var(--radius-sm); padding:11px 20px; border:1px solid transparent;
    background:var(--primary); color:#fff; transition:transform .04s, background .15s, box-shadow .15s, opacity .15s; box-shadow:var(--shadow-sm);
  }
  button.btn:hover{background:var(--primary-ink)}
  button.btn:active{transform:translateY(1px)}
  button.btn:disabled{opacity:.45; cursor:not-allowed}
  button.btn.ghost{background:transparent; color:var(--primary); border-color:var(--line); box-shadow:none}
  button.btn.ghost:hover{background:var(--primary-soft)}
  button.btn.soft{background:var(--primary-soft); color:var(--primary-ink); box-shadow:none}
  button.btn.accent{background:linear-gradient(135deg,var(--brand-gold),var(--brand-gold-lt)); color:#3a2c00; box-shadow:var(--shadow-gold)}
  button.btn.accent:hover{filter:brightness(1.04)}
  button.btn.sm{padding:8px 14px; font-size:13.5px}
  .actions{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

  .pill{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; padding:4px 11px; border-radius:999px; background:var(--green-pale); color:var(--primary-ink)}
  .pill.warn{background:var(--gold-pale); color:var(--accent-ink)}
  .pill.dot::before{content:""; width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.75}

  .res{display:flex; justify-content:space-between; align-items:center; gap:14px; cursor:pointer; transition:transform .12s var(--ease), box-shadow .15s}
  .res:hover{transform:translateY(-2px); box-shadow:var(--shadow)}
  .res:hover h2{color:var(--primary)}
  .res h2{margin:0}
  .res .meta{font-size:13px; color:var(--muted)}

  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin:22px 0}
  .tab{font:inherit; font-size:15px; font-weight:500; background:none; border:none; cursor:pointer; color:var(--muted); padding:10px 14px; border-bottom:2px solid transparent; margin-bottom:-1px}
  .tab.active{color:var(--primary-ink); border-bottom-color:var(--accent); font-weight:900}

  .q{border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:14px; background:var(--surface); box-shadow:var(--shadow-sm)}
  .q .qtext{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-size:18px; font-weight:700; margin:0 0 14px; line-height:1.55}
  .answers{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px}
  @media(max-width:560px){ .answers{grid-template-columns:1fr} .bar{padding:12px 16px} h1{font-size:26px} }
  .ans{border:1px solid var(--line); border-radius:var(--radius-sm); padding:13px 14px; background:var(--field-bg)}
  .ans .who{font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:6px}
  .ans .body{white-space:pre-wrap; word-break:break-word}
  .covered{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; color:var(--muted); background:repeating-linear-gradient(135deg,var(--sand),var(--sand) 10px,var(--card-2) 10px,var(--card-2) 20px); border-style:dashed; min-height:84px}
  .covered .lock{font-size:18px; opacity:.6}
  .revealed-glow{animation:gentle .9s ease}
  @keyframes gentle{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion: reduce){ .revealed-glow{animation:none} }

  .empty{text-align:center; color:var(--muted); padding:40px 10px}
  .center{max-width:460px; margin:8vh auto 0}
  .or{display:flex; align-items:center; gap:12px; color:var(--muted); font-size:13px; margin:18px 0}
  .or::before,.or::after{content:""; height:1px; background:var(--line); flex:1}
  .toast{position:fixed; bottom:22px; right:50%; transform:translateX(50%); background:var(--primary-ink); color:#fff; padding:11px 18px; border-radius:var(--radius-sm); font-size:14px; box-shadow:var(--shadow); opacity:0; transition:opacity .2s; pointer-events:none; z-index:50}
  .toast.show{opacity:1}
  .codebox{font-family:'ThmanyahSans',ui-monospace,monospace; letter-spacing:3px; font-size:22px; font-weight:900; color:var(--primary-ink); background:var(--green-pale); border-radius:var(--radius-sm); padding:14px; text-align:center; border:1px dashed var(--line)}
  .muted{color:var(--muted)} .sp{height:8px} .spacer{flex:1}
  .checks label{display:flex; gap:9px; align-items:flex-start; color:var(--ink); background:var(--field-bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; cursor:pointer; font-size:14px}
  .checks input{margin-top:5px}
  footer.tiny{max-width:720px; margin:30px auto 0; padding:0 20px; color:var(--muted); font-size:12px; text-align:center}
  .api-edit{font-size:12px; color:var(--muted); margin-top:18px; text-align:center}
  .api-edit input{display:inline-block; width:auto; min-width:280px; font-size:12px; padding:6px 9px; margin-top:6px}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="mark">سكن<small>مساحتكما للتوافق</small></div>
    <div class="bar-actions" id="barActions"></div>
  </div>
</header>

<main class="wrap" id="app"></main>
<footer class="tiny" id="foot"></footer>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  // ---------- config ----------
  const DEFAULT_API = (location.protocol === "http:" || location.protocol === "https:")
    ? location.origin.replace(/\/$/, "") + "/api"
    : "https://sakan-md.vercel.app/api";
  const API = () => localStorage.getItem("sakan_api") || DEFAULT_API;

  const S = {
    token: localStorage.getItem("sakan_token") || null,
    code:  localStorage.getItem("sakan_code")  || null,
    name:  localStorage.getItem("sakan_name")  || null,
    view: "onboarding", resourceId: null, tab: "summary",
    detail: null, responses: {},
  };

  const STATE_AR = {
    not_started:"لم يبدأ", in_progress:"قيد العمل", completed:"مكتمل",
    open:"بانتظار إجابتيكما", answered_by_one:"أجاب أحدكما", ready_to_reveal:"جاهز للكشف",
    revealed:"مكشوف", decided:"تقرّر", draft:"مسودّة", confirmed:"مؤكَّد", revisited:"قيد المراجعة",
  };

  // ---------- helpers ----------
  const el = document.getElementById("app");
  const esc = (s)=> String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2600); }

  async function api(method, path, body){
    const res = await fetch(API()+path, {
      method,
      headers: Object.assign({"content-type":"application/json"}, S.token?{authorization:"Bearer "+S.token}:{}),
      body: body? JSON.stringify(body): undefined,
    });
    let data=null; try{ data = await res.json(); }catch(e){}
    if(!res.ok){ const code = data && data.error ? data.error.code : ("HTTP_"+res.status); const e=new Error(code); e.code=code; e.data=data; throw e; }
    return data;
  }
  function errMsg(e){
    const m = {
      FIREBASE_ENV_MISSING:"الخادم غير مهيّأ بعد (متغيّر البيئة ناقص).",
      QUESTION_LOCKED:"السؤال أُغلق بعد الكشف ولا يمكن تعديل الإجابة.",
      STATE_CONFLICT:"لا يمكن الكشف قبل أن تجيبا كلاكما.",
      NO_REVEALED_QUESTION:"اكشفا سؤالًا واحدًا على الأقل قبل تسجيل القرار.",
      NO_QUESTIONS_LINKED:"اختر سؤالًا واحدًا على الأقل للقرار.",
      INVALID_CODE:"الكود غير صحيح أو مُستخدَم.",
      PAIR_FULL:"هذا الميثاق مكتمل بطرفين بالفعل.",
      UNAUTHENTICATED:"انتهت الجلسة، سجّل الدخول من جديد.",
    };
    return m[e.code] || ("حدث خطأ: "+(e.code||"غير معروف"));
  }
  function save(){ if(S.token) localStorage.setItem("sakan_token",S.token); if(S.code) localStorage.setItem("sakan_code",S.code); if(S.name) localStorage.setItem("sakan_name",S.name); }
  function titleFromUrl(u){
    try{
      const m = u.match(/[?&]list=([\w-]+)/); if(m) return "قائمة تشغيل · "+m[1].slice(0,8);
      const v = u.match(/(?:youtu\.be\/|[?&]v=)([\w-]{6,})/); if(v) return "فيديو · "+v[1];
    }catch(e){}
    return u.length>44 ? u.slice(0,44)+"…" : u;
  }
  function logout(){ localStorage.removeItem("sakan_token"); localStorage.removeItem("sakan_code"); localStorage.removeItem("sakan_name"); S.token=S.code=S.name=null; S.view="onboarding"; render(); }

  // ---------- header ----------
  function renderBar(){
    const b = document.getElementById("barActions");
    const sw = `<div class="themesw" role="group" aria-label="السمة">
      <button data-set-theme="light" title="فاتح">☀️</button>
      <button data-set-theme="dark" title="داكن">🌙</button>
      <button data-set-theme="oled" title="OLED">⚫</button></div>`;
    const head = S.token
      ? (S.code? `<span class="chip" title="شارِك هذا الكود مع شريكك">كود الميثاق: ${esc(S.code)}</span>`:"")
        + `<button class="linkbtn" data-act="library">المكتبة</button>`
        + `<button class="linkbtn" data-act="logout">خروج</button>`
      : "";
    b.innerHTML = head + sw;
    markTheme();
  }
  function markTheme(){
    const cur = document.documentElement.getAttribute("data-theme")||"light";
    document.querySelectorAll(".themesw button").forEach(x=>x.classList.toggle("on", x.dataset.setTheme===cur));
  }
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    try{ localStorage.setItem("sakan_theme", t); }catch(e){}
    markTheme();
  }

  // ---------- views ----------
  function render(){
    renderBar();
    if(!S.token){ return renderOnboarding(); }
    if(S.view==="resource" && S.resourceId){ return renderResource(); }
    return renderLibrary();
  }

  function renderOnboarding(){
    el.innerHTML = `
      <div class="center">
        <h1 class="display">أهلًا بكما في سكن</h1>
        <p class="lede">مساحة خاصة لكما وحدكما: حوّلا ما تقرآنه وتسمعانه إلى فهمٍ مشترك، ثم إلى قرار تتفقان عليه.</p>

        <div class="card">
          <div class="eyebrow">طرفٌ جديد</div>
          <h2>ابدآ ميثاقًا جديدًا</h2>
          <p class="muted" style="margin-top:-6px">أنشئ المساحة، وستحصل على كودٍ تشاركه مع شريكك لينضم.</p>
          <div class="row"><label>اسمك (اختياري)</label><input id="nameC" type="text" placeholder="مثلًا: مصطفى"></div>
          <button class="btn" data-act="create">إنشاء ميثاق</button>
        </div>

        <div class="or">أو</div>

        <div class="card">
          <div class="eyebrow">انضمام</div>
          <h2>عندك كود؟</h2>
          <p class="muted" style="margin-top:-6px">أدخل الكود الذي شاركه معك شريكك.</p>
          <div class="row"><label>اسمك (اختياري)</label><input id="nameJ" type="text" placeholder="مثلًا: ضحى"></div>
          <div class="row"><label>كود الميثاق</label><input id="codeJ" type="text" placeholder="مثال: 4A4FF949" style="letter-spacing:2px; text-transform:uppercase"></div>
          <button class="btn ghost" data-act="join">انضمام</button>
        </div>

        <div class="api-edit">
          <div>الخادم: <span class="muted">${esc(API())}</span></div>
          <button class="linkbtn" data-act="apiedit">تغيير عنوان الخادم</button>
        </div>
      </div>`;
  }

  async function renderLibrary(){
    S.view="library"; S.resourceId=null;
    el.innerHTML = `<h1 class="display">المكتبة</h1><p class="lede">كل ما تعملان عليه معًا، في مكانٍ واحد.</p><div id="list"><div class="empty">…تحميل</div></div>
      <div class="card">
        <div class="eyebrow">استيراد سريع</div>
        <h2>أضِف عدة روابط دفعة واحدة</h2>
        <p class="muted" style="margin-top:-6px">الصق الروابط — رابط في كل سطر (يوتيوب، قوائم تشغيل، أي رابط).</p>
        <div class="row"><textarea id="bulk" placeholder="https://...&#10;https://...&#10;https://..." style="min-height:130px"></textarea></div>
        <button class="btn" data-act="importBulk">استورد الكل</button>
      </div>
      <div class="card">
        <div class="eyebrow">إضافة</div>
        <h2>أضِف موردًا</h2>
        <div class="row"><label>العنوان</label><input id="rTitle" type="text" placeholder="مثلًا: محاضرة عن الميثاق الغليظ"></div>
        <div class="row"><label>الرابط (اختياري)</label><input id="rLink" type="text" placeholder="https://..."></div>
        <div class="row"><label>نص المصدر (لتوليد الملخص والأسئلة)</label><textarea id="rText" placeholder="الصق هنا النص أو أهم النقاط من المورد…"></textarea></div>
        <button class="btn" data-act="addRes">أضِف</button>
      </div>`;
    try{
      const items = await api("GET","/resources");
      const list = document.getElementById("list");
      if(!items.length){ list.innerHTML = `<div class="empty">لا توجد موارد بعد. أضِف أول مورد بالأسفل لتبدآ.</div>`; return; }
      list.innerHTML = items.map(r=>`
        <div class="card res" data-open="${esc(r.id)}">
          <div style="display:flex;gap:14px;align-items:center;flex:1;min-width:0">
            ${ r.thumbnail ? `<img src="${esc(r.thumbnail)}" alt="" loading="lazy" style="width:104px;height:62px;object-fit:cover;border-radius:10px;flex:none">` : "" }
            <div style="min-width:0"><h2 style="margin:0">${esc(r.title)}</h2><div class="meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.link?esc(r.link):"بدون رابط"}</div></div>
          </div>
          <span class="pill dot ${r.status==='completed'?'':'warn'}" style="flex:none">${STATE_AR[r.status]||esc(r.status)}</span>
        </div>`).join("");
    }catch(e){ document.getElementById("list").innerHTML = `<div class="empty">${esc(errMsg(e))}</div>`; }
  }

  async function renderResource(){
    el.innerHTML = `<div class="empty">…تحميل</div>`;
    try{ S.detail = await api("GET","/resources/"+S.resourceId); }
    catch(e){ el.innerHTML = `<div class="empty">${esc(errMsg(e))}</div><button class="btn ghost" data-act="library">رجوع</button>`; return; }
    const r = S.detail.resource;
    el.innerHTML = `
      <button class="linkbtn" data-act="library">→ المكتبة</button>
      <h1 class="display" style="margin-top:8px">${esc(r.title)}</h1>
      <span class="pill dot ${r.status==='completed'?'':'warn'}">${STATE_AR[r.status]||esc(r.status)}</span>
      <div class="tabs">
        <button class="tab ${S.tab==='summary'?'active':''}" data-tab="summary">الملخص</button>
        <button class="tab ${S.tab==='discussion'?'active':''}" data-tab="discussion">الحوار</button>
        <button class="tab ${S.tab==='decisions'?'active':''}" data-tab="decisions">القرارات</button>
      </div>
      <div id="tab"></div>`;
    if(S.tab==="summary") renderSummary();
    else if(S.tab==="discussion") renderDiscussion();
    else renderDecisions();
  }

  function renderSummary(){
    const t = document.getElementById("tab");
    const sum = S.detail.summary;
    t.innerHTML = `
      <div class="card">
        <div class="eyebrow">الملخص</div>
        ${ sum ? `<p style="white-space:pre-wrap">${esc(sum.content)}</p>`
               : `<p class="muted">لم يُولَّد ملخص بعد. سيُولّده الذكاء الاصطناعي من نص المصدر (هو فقط يلخّص ويقترح الأسئلة — القرار لكما وحدكما).</p>` }
        <div class="actions" style="margin-top:12px">
          <button class="btn ${sum?'ghost':''}" data-act="genSummary">${sum?'إعادة التوليد':'وَلِّد الملخص'}</button>
        </div>
      </div>
      <div class="card tight">
        <div class="actions"><span class="muted">جاهزان للحوار؟</span><div class="spacer"></div>
        <button class="btn soft" data-act="goDiscuss">اذهبا إلى الحوار ←</button></div>
      </div>`;
  }

  async function renderDiscussion(){
    const t = document.getElementById("tab");
    const qs = S.detail.questions || [];
    if(!qs.length){
      t.innerHTML = `<div class="card"><div class="eyebrow">الحوار</div>
        <p class="muted">لا توجد أسئلة بعد. ولِّد أسئلة نقاش من الملخص، أو أضِف سؤالك الخاص.</p>
        <div class="actions" style="margin-top:10px">
          <button class="btn" data-act="genQuestions">وَلِّد أسئلة للنقاش</button>
        </div></div>
        <div class="card tight"><div class="row"><label>أضِف سؤالًا بنفسك</label><input id="qNew" type="text" placeholder="اكتب سؤالًا…"></div><button class="btn ghost sm" data-act="addQ">أضِف السؤال</button></div>`;
      return;
    }
    t.innerHTML = `<div id="qs"><div class="empty">…تحميل الإجابات</div></div>
      <div class="card tight"><div class="row"><label>أضِف سؤالًا</label><input id="qNew" type="text" placeholder="اكتب سؤالًا…"></div><button class="btn ghost sm" data-act="addQ">أضِف السؤال</button></div>`;
    // load each question's responses
    const data = await Promise.all(qs.map(q=> api("GET","/questions/"+q.id+"/responses").then(r=>({q,r})).catch(()=>({q,r:{questionState:q.state,mine:null,partner:null}}))));
    document.getElementById("qs").innerHTML = data.map(({q,r})=>{
      const st = r.questionState;
      const locked = st==="revealed" || st==="decided";
      const mine = r.mine? r.mine.text : "";
      const partnerCell = (locked && r.partner)
        ? `<div class="ans revealed-glow"><div class="who"><span class="pill" style="background:var(--accent-soft);color:#7c4b5b">الطرف الآخر</span></div><div class="body">${esc(r.partner.text)}</div></div>`
        : `<div class="ans covered"><div class="lock">۝</div><div>إجابة الطرف الآخر مخفية<br>حتى تجيبا كلاكما</div></div>`;
      return `<div class="q" data-q="${esc(q.id)}">
        <p class="qtext">${esc(q.text)}</p>
        <span class="pill dot ${locked?'':'warn'}">${STATE_AR[st]||esc(st)}</span>
        <div class="answers">
          <div class="ans">
            <div class="who">إجابتك</div>
            <textarea class="myans" ${locked?'disabled':''} placeholder="${locked?'':'اكتب إجابتك بصدق…'}">${esc(mine)}</textarea>
            ${locked? '' : `<div style="margin-top:8px"><button class="btn sm" data-act="saveAns" data-q="${esc(q.id)}">احفظ إجابتي</button></div>`}
          </div>
          ${partnerCell}
        </div>
        ${ st==="ready_to_reveal" ? `<div class="actions" style="margin-top:12px"><button class="btn accent sm" data-act="reveal" data-q="${esc(q.id)}">اكشفا الإجابتين معًا</button></div>`
          : (st==="answered_by_one" ? `<div class="actions" style="margin-top:12px"><span class="muted" style="font-size:13px">بانتظار الطرف الآخر…</span><button class="linkbtn" data-act="force" data-q="${esc(q.id)}">اكشف الآن</button></div>` : "") }
      </div>`;
    }).join("");
  }

  function renderDecisions(){
    const t = document.getElementById("tab");
    const decs = S.detail.decisions || [];
    const qs = (S.detail.questions||[]).filter(q=> q.state==="revealed" || q.state==="decided");
    const list = decs.length ? decs.map(d=>`
      <div class="card">
        <div class="eyebrow">قرار</div>
        <p style="font-family:'El Messiri',serif; font-size:18px; margin:0 0 10px">${esc(d.statement)}</p>
        <div class="actions">
          <span class="pill dot ${d.state==='confirmed'?'':'warn'}" style="${d.state==='confirmed'?'background:var(--accent-soft);color:#7c4b5b':''}">${STATE_AR[d.state]||esc(d.state)} ${d.confirmCount?('· '+d.confirmCount+'/2'):''}</span>
          ${ d.state!=="confirmed" ? `<button class="btn accent sm" data-act="confirm" data-d="${esc(d.id)}">أؤكّد موافقتي</button>` : `<span class="muted" style="font-size:13px">مؤكَّد من كليكما — قرارٌ نهائي.</span>` }
        </div>
      </div>`).join("") : `<div class="empty">لا قرارات بعد. القرار هو ثمرة الحوار — سجّلاه بعد أن تكشفا إجاباتكما.</div>`;

    t.innerHTML = list + `
      <div class="card">
        <div class="eyebrow">تسجيل قرار</div>
        <h2>على ماذا اتفقتما؟</h2>
        ${ qs.length ? `
        <div class="row"><label>صياغة القرار</label><textarea id="dStmt" placeholder="مثلًا: اتفقنا على تخصيص ليلة أسبوعية للحوار."></textarea></div>
        <label>اربط القرار بالأسئلة التي ناقشتماها</label>
        <div class="checks">${qs.map(q=>`<label><input type="checkbox" class="dq" value="${esc(q.id)}"><span>${esc(q.text)}</span></label>`).join("")}</div>
        <button class="btn" data-act="createDec">سجّل القرار (مسودّة)</button>
        <p class="muted" style="font-size:12.5px; margin-top:10px">يصبح القرار نهائيًا فقط بعد أن يؤكّده الطرفان.</p>
        ` : `<p class="muted">اكشفا سؤالًا واحدًا على الأقل في تبويب الحوار أولًا، ثم عودا لتسجيل قراركما.</p>` }
      </div>`;
  }

  // ---------- actions ----------
  async function go(act, node){
    try{
      if(act==="apiedit"){
        const v = prompt("عنوان الخادم (API base):", API());
        if(v){ localStorage.setItem("sakan_api", v.trim().replace(/\/$/,"")); render(); }
        return;
      }
      if(act==="create"){
        const name = (document.getElementById("nameC").value||"").trim();
        const out = await api("POST","/pair",{ email:"a@sakan.local", displayName:name||"أنا" });
        S.token=out.token; S.code=out.pairCode; S.name=name; save(); S.view="library"; render();
        toast("تم إنشاء الميثاق — شارك الكود "+out.pairCode); return;
      }
      if(act==="join"){
        const name=(document.getElementById("nameJ").value||"").trim();
        const code=(document.getElementById("codeJ").value||"").trim().toUpperCase();
        if(!code) return toast("أدخل الكود");
        const out = await api("POST","/pair/join",{ code, email:"b@sakan.local", displayName:name||"أنا" });
        S.token=out.token; S.code=code; S.name=name; save(); S.view="library"; render();
        toast("انضممت إلى الميثاق"); return;
      }
      if(act==="logout") return logout();
      if(act==="library"){ S.view="library"; S.tab="summary"; render(); return; }

      if(act==="addRes"){
        const title=(document.getElementById("rTitle").value||"").trim();
        if(!title) return toast("اكتب عنوان المورد");
        const link=(document.getElementById("rLink").value||"").trim();
        const sourceText=(document.getElementById("rText").value||"").trim();
        await api("POST","/resources",{ title, link:link||null, sourceText:sourceText||null });
        toast("أُضيف المورد"); renderLibrary(); return;
      }
      if(act==="importBulk"){
        const lines=(document.getElementById("bulk").value||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
        if(!lines.length) return toast("الصق رابطًا واحدًا على الأقل");
        node.disabled=true; const orig=node.textContent;
        const q=lines.slice(); let done=0, ok=0;
        async function worker(){ while(q.length){ const link=q.shift(); try{ await api("POST","/resources",{ title:titleFromUrl(link), link }); ok++; }catch(e){} done++; node.textContent="…"+done+"/"+lines.length; } }
        await Promise.all(Array.from({length:Math.min(4,lines.length)}, worker));   // 4 at a time → أسرع بكتير
        node.disabled=false; node.textContent=orig;
        toast("تم استيراد "+ok+" من "+lines.length+" — تقدر تعيد تسميتها لاحقًا");
        renderLibrary(); return;
      }
      if(act==="open" || node?.dataset.open){ S.resourceId=node.dataset.open; S.view="resource"; S.tab="summary"; render(); return; }

      if(act==="genSummary"){ await api("POST","/resources/"+S.resourceId+"/summary"); toast("تم توليد الملخص"); renderResource(); return; }
      if(act==="goDiscuss"){ S.tab="discussion"; renderResource(); return; }
      if(act==="genQuestions"){ await api("POST","/resources/"+S.resourceId+"/questions/generate"); toast("تم توليد الأسئلة"); renderResource(); return; }
      if(act==="addQ"){ const txt=(document.getElementById("qNew").value||"").trim(); if(!txt) return toast("اكتب السؤال"); await api("POST","/resources/"+S.resourceId+"/questions",{text:txt}); renderResource(); return; }

      if(act==="saveAns"){
        const q=node.dataset.q; const box=document.querySelector(`.q[data-q="${q}"] .myans`);
        const text=(box.value||"").trim(); if(!text) return toast("اكتب إجابتك");
        await api("PUT","/questions/"+q+"/responses",{text}); toast("حُفظت إجابتك"); renderResource(); return;
      }
      if(act==="reveal"){ await api("POST","/questions/"+node.dataset.q+"/reveal"); toast("انكشفت الإجابتان"); renderResource(); return; }
      if(act==="force"){ if(confirm("الكشف الآن قبل أن يجيب الطرف الآخر؟")){ await api("POST","/questions/"+node.dataset.q+"/force-reveal"); renderResource(); } return; }

      if(act==="createDec"){
        const statement=(document.getElementById("dStmt").value||"").trim();
        if(!statement) return toast("اكتب صياغة القرار");
        const questionIds=[...document.querySelectorAll(".dq:checked")].map(x=>x.value);
        if(!questionIds.length) return toast("اختر سؤالًا واحدًا على الأقل");
        await api("POST","/decisions",{ resourceId:S.resourceId, statement, questionIds });
        toast("سُجّل القرار كمسودّة"); renderResource(); return;
      }
      if(act==="confirm"){ await api("POST","/decisions/"+node.dataset.d+"/confirm"); toast("سُجّلت موافقتك"); renderResource(); return; }
    }catch(e){
      if(e.code==="UNAUTHENTICATED"){ toast(errMsg(e)); return logout(); }
      toast(errMsg(e));
    }
  }

  // ---------- events ----------
  document.body.addEventListener("click",(ev)=>{
    const th = ev.target.closest("[data-set-theme]");
    if(th){ applyTheme(th.dataset.setTheme); return; }
    const a = ev.target.closest("[data-act]");
    if(a){ ev.preventDefault(); return go(a.dataset.act, a); }
    const t = ev.target.closest("[data-tab]");
    if(t){ S.tab=t.dataset.tab; renderResource(); return; }
    const open = ev.target.closest("[data-open]");
    if(open){ S.resourceId=open.dataset.open; S.view="resource"; S.tab="summary"; render(); }
  });

  document.getElementById("foot").innerHTML = "سكن · مساحة خاصة لطرفين — خاصّة بطبيعتها، بلا مشاركة عامة.";
  render();
})();
</script>
</body>
</html>
