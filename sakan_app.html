<!--
  سكن — النسخة المتوافقة مع الرؤية (نموذج قابل للتشغيل)
  ====================================================================
  الشاشات: الهوم (حلقات مفتوحة) · المكتبة · تفاصيل المورد · مركز الحوار ·
           سجل القرارات · الإعدادات (تصدير JSON).
  مُستبعد عمدًا (التزامًا بقواعد سكن): الشارات/الإنجازات، الإشعارات،
           التعليقات/الردود، مكتبة الوسائط، بطاقات الإحصائيات، رسائل المبروك.

  للدمج في التطبيق الحقيقي (React/Firebase أو SPA الموحّد):
    • state.*            → Firestore collections (الأسماء معلّمة تحت كل قسم).
    • قاعدة الكشف المزدوج → تُفرض في firestore.rules على السيرفر، لا في الواجهة.
    • زر «أنا مصطفى/ضحى»  → يُستبدل بالمستخدم المسجّل (useAuth/auth.currentUser).
    • التصدير JSON        → يقرأ من Firestore بدل الحالة المحلية.
  نظام الألوان والثيمات مطابق لهوية «زاد».
-->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>سكن</title>
<script>(function(){try{var t=localStorage.getItem('sakan_theme')||'light';document.documentElement.setAttribute('data-theme',['light','dark','oled'].indexOf(t)>=0?t:'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  [data-theme="light"]{--bg:#faf6ec;--surface:#fff;--surface-2:#f4eede;--primary:#0e3b2e;--primary-2:#1a5d47;--on-primary:#fbf8ef;--accent:#c9a14a;--accent-soft:#e7d3a0;--text:#16261f;--muted:#5d6b63;--line:#e6ddc7;--shadow:0 10px 30px -12px rgba(14,59,46,.28);--shadow-sm:0 4px 14px -8px rgba(14,59,46,.30)}
  [data-theme="dark"]{--bg:#0c2a21;--surface:#11362a;--surface-2:#0e2f25;--primary:#2e7d63;--primary-2:#3a9a78;--on-primary:#f3fbf7;--accent:#d8b35e;--accent-soft:#4a4226;--text:#e7f3ec;--muted:#9fc0b2;--line:#1d4a3a;--shadow:0 12px 34px -14px rgba(0,0,0,.55);--shadow-sm:0 6px 16px -10px rgba(0,0,0,.5)}
  [data-theme="oled"]{--bg:#000;--surface:#0a0a0a;--surface-2:#0f0f0f;--primary:#2e7d63;--primary-2:#3a9a78;--on-primary:#f3fbf7;--accent:#d8b35e;--accent-soft:#2a2413;--text:#eef4f0;--muted:#8aa399;--line:#1a1a1a;--shadow:0 12px 34px -14px rgba(0,0,0,.8);--shadow-sm:0 6px 16px -10px rgba(0,0,0,.7)}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Tajawal",system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .wrap{max-width:780px;margin:0 auto;padding:0 18px 72px}
  header.bar{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar-in{max-width:780px;margin:0 auto;padding:13px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .brand{font-weight:900;font-size:22px;color:var(--primary);letter-spacing:-.5px;margin-inline-end:auto;cursor:pointer}
  .brand span{color:var(--accent)}
  .seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:3px}
  .seg button{border:0;background:transparent;color:var(--muted);font:inherit;font-size:14px;cursor:pointer;padding:6px 10px;border-radius:11px}
  .seg button[aria-pressed="true"]{background:var(--surface);color:var(--primary);box-shadow:var(--shadow-sm);font-weight:700}
  .theme-sw button{font-size:15px;padding:6px 9px}
  nav.tabs{display:flex;gap:7px;margin:20px 0 16px;flex-wrap:wrap}
  nav.tabs button{border:1px solid var(--line);background:var(--surface);color:var(--muted);font:inherit;font-weight:700;font-size:14.5px;cursor:pointer;padding:10px 15px;border-radius:14px;transition:.2s}
  nav.tabs button[aria-selected="true"]{background:var(--primary);color:var(--on-primary);border-color:var(--primary)}
  h1.page{font-size:25px;font-weight:900;margin:6px 0 4px;color:var(--primary)}
  p.lede{color:var(--muted);margin:0 0 20px;font-size:15px}
  .cat{margin:24px 0 9px;font-size:13px;font-weight:900;color:var(--muted);letter-spacing:.3px;display:flex;align-items:center;gap:9px}
  .cat::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:13px;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
  .card.click{cursor:pointer}.card.click:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .q{font-size:17px;font-weight:700;margin:0 0 11px;line-height:1.55}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .pill{font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;border:1px solid transparent}
  .pill.wait{background:var(--surface-2);color:var(--muted);border-color:var(--line)}
  .pill.mine{background:color-mix(in srgb,var(--accent) 18%,var(--surface));color:var(--primary);border-color:var(--accent-soft)}
  .pill.ready{background:var(--primary);color:var(--on-primary)}
  .pill.done{background:color-mix(in srgb,var(--primary-2) 16%,var(--surface));color:var(--primary-2);border-color:var(--primary-2)}
  button.act{border:0;border-radius:13px;font:inherit;font-weight:700;font-size:14.5px;cursor:pointer;padding:10px 16px;transition:.15s}
  button.act.primary{background:var(--primary);color:var(--on-primary)}button.act.primary:hover{background:var(--primary-2)}
  button.act.gold{background:linear-gradient(135deg,var(--accent),#b8902f);color:#1c1405}button.act.gold:hover{filter:brightness(1.05)}
  button.act.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  button.act.sm{padding:7px 12px;font-size:13.5px}
  button.act:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
  textarea,input.txt{width:100%;background:var(--surface-2);color:var(--text);border:1px solid var(--line);border-radius:13px;font:inherit;font-size:15px;padding:11px 13px;margin-top:6px}
  textarea{resize:vertical;min-height:80px}textarea:focus,input.txt:focus{outline:none;border-color:var(--accent)}
  label.fl{display:block;font-size:13px;font-weight:900;color:var(--muted);margin-top:14px}
  .answer-box{margin-top:13px;border-top:1px dashed var(--line);padding-top:13px}
  .reveal{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:13px}
  @media(max-width:560px){.reveal{grid-template-columns:1fr}}
  .ans{background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:12px 14px}
  .ans .who{font-size:13px;font-weight:900;color:var(--accent);margin:0 0 6px}.ans .txt{font-size:14.5px;margin:0;white-space:pre-wrap}
  .status-seg{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
  .status-seg button{border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font:inherit;font-size:13px;font-weight:700;padding:7px 12px;border-radius:11px;cursor:pointer}
  .status-seg button[aria-pressed="true"]{background:var(--primary);color:var(--on-primary);border-color:var(--primary)}
  .ticks{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-top:8px}
  .tick b{color:var(--primary-2)}
  .chk{appearance:none;width:22px;height:22px;border:2px solid var(--line);border-radius:8px;cursor:pointer;position:relative;flex:0 0 auto}
  .chk:checked{background:var(--primary-2);border-color:var(--primary-2)}
  .chk:checked::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:var(--on-primary);font-size:13px;font-weight:900}
  .empty{text-align:center;color:var(--muted);padding:46px 20px;border:1px dashed var(--line);border-radius:18px}
  .empty b{display:block;color:var(--text);font-size:17px;margin-bottom:6px}
  a.link{color:var(--accent);font-weight:700;text-decoration:none}a.link:hover{text-decoration:underline}
  .back{background:transparent;border:0;color:var(--muted);font:inherit;font-weight:700;cursor:pointer;padding:4px 0;margin-bottom:6px}
  .hidden{display:none}
  .note{font-size:12.5px;color:var(--muted);background:var(--surface-2);border:1px dashed var(--line);border-radius:11px;padding:8px 11px;margin-top:10px}
</style>
</head>
<body>
<header class="bar">
  <div class="bar-in">
    <div class="brand" id="home-link">سَكَن<span>.</span></div>
    <div class="seg" id="who" title="من الطرف الحالي؟ (في التطبيق الحقيقي يُحدّد بحسابك)">
      <button data-user="m" aria-pressed="true">مصطفى</button>
      <button data-user="d" aria-pressed="false">ضحى</button>
    </div>
    <div class="seg theme-sw" id="themesw">
      <button data-theme="light" title="فاتح">☀️</button>
      <button data-theme="dark" title="داكن">🌙</button>
      <button data-theme="oled" title="OLED">⚫</button>
    </div>
  </div>
</header>

<div class="wrap">
  <nav class="tabs" id="tabs">
    <button data-tab="home" aria-selected="true">الرئيسية</button>
    <button data-tab="library" aria-selected="false">المكتبة</button>
    <button data-tab="dialogue" aria-selected="false">الحوار</button>
    <button data-tab="decisions" aria-selected="false">القرارات</button>
    <button data-tab="settings" aria-selected="false">الإعدادات</button>
  </nav>
  <main id="view"></main>
</div>

<script>
// ====================== الحالة (in-memory للعرض) ======================
const USERS={m:"مصطفى",d:"ضحى"};
let me="m";
const partner=()=>me==="m"?"d":"m";

// resources → Firestore: resources/{id} ؛  progress[id][user] → progress/{id}/{user}
const state={
  resources:[
    {id:"r1",title:"محاضرة: أسس التفاهم الزوجي",url:"https://example.com/lec1",desc:"مدخل لمهارات الإنصات وإدارة التوقعات بين الزوجين.",sharedNote:""},
    {id:"r2",title:"كتاب: فقه الأسرة المسلمة (مقتطف)",url:"https://example.com/book1",desc:"فصل في الحقوق والواجبات المتبادلة.",sharedNote:""},
  ],
  progress:{},        // { resourceId:{ m:'new|watching|done', d:'...' } }
  privateNotes:{},    // { resourceId:{ m:'...', d:'...' } }
  summaries:{},       // { resourceId:'...' }  ← AI summary (من الباك-إند)
  answers:{},         // answers/{questionId}/{userId}
  discussed:{},       // { questionId:true }  ← «تمت المناقشة»
  decisions:[],       // decisions collection
};
const QUESTIONS=[
  {id:"v1",cat:"دينية",q:"إيه الطقوس الدينية اللي نفسك تكون ثابتة في بيتنا؟"},
  {id:"v2",cat:"دينية",q:"لو اختلفنا في فهم مسألة شرعية، نرجع لمين أو لإيه؟"},
  {id:"m1",cat:"مالية",q:"حساب مشترك ولا منفصل ولا مزيج؟ وإزاي نقسّم المصاريف؟"},
  {id:"m2",cat:"مالية",q:"إيه هدفنا المالي لأول سنتين؟"},
  {id:"f1",cat:"أسرية",q:"إيه الحدود الصحية في علاقتنا بأهلنا؟"},
  {id:"a1",cat:"أهداف",q:"لو جالي عرض شغل في مدينة تانية، نتعامل مع القرار إزاي؟"},
  {id:"x1",cat:"خلافات",q:"لما نتخانق، إيه اللي محتاج كل واحد يسمعه عشان يهدا؟"},
];
const STATUS={new:"لم يبدأ",watching:"قيد المشاهدة",done:"مكتمل"};

// ====================== أدوات ======================
const $=s=>document.querySelector(s);
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const prog=(id,u)=>(state.progress[id]||{})[u]||"new";
const pNote=(id,u)=>(state.privateNotes[id]||{})[u]||"";
const myAns=q=>(state.answers[q]||{})[me];
const aAns=q=>(state.answers[q]||{})[partner()];
const canReveal=q=>!!myAns(q)&&!!aAns(q);
let route={tab:"home",id:null};

// ====================== التحكّم العام ======================
$("#themesw").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;document.documentElement.setAttribute("data-theme",b.dataset.theme);try{localStorage.setItem("sakan_theme",b.dataset.theme)}catch(e){}});
$("#who").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;me=b.dataset.user;[...$("#who").children].forEach(x=>x.setAttribute("aria-pressed",x.dataset.user===me));render()});
$("#home-link").addEventListener("click",()=>go("home"));
$("#tabs").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;go(b.dataset.tab)});
function go(tab,id=null){route={tab,id};[...$("#tabs").children].forEach(x=>x.setAttribute("aria-selected",x.dataset.tab===tab));render()}

// ====================== العرض الرئيسي ======================
function render(){
  const v=$("#view");
  if(route.tab==="home") v.innerHTML=viewHome();
  else if(route.tab==="library") v.innerHTML=route.id?viewDetail(route.id):viewLibrary();
  else if(route.tab==="dialogue") v.innerHTML=viewDialogue();
  else if(route.tab==="decisions") v.innerHTML=viewDecisions();
  else if(route.tab==="settings") v.innerHTML=viewSettings();
}

// ---------- الرئيسية: حلقات مفتوحة (سحب لا دفع، لا إحصائيات) ----------
function viewHome(){
  const qTurn=QUESTIONS.filter(x=>!myAns(x.id));
  const rTurn=state.resources.filter(r=>prog(r.id,me)!=="done");
  const weekly=QUESTIONS[new Date().getDate()%QUESTIONS.length];
  let loops="";
  if(qTurn.length) loops+=`<div class="card click" data-goq="${qTurn[0].id}"><span class="pill ready">سؤال مستني دورك</span><p class="q" style="margin-top:10px">${esc(qTurn[0].q)}</p><div class="row"><span class="pill wait">${esc(qTurn[0].cat)}</span><button class="act primary sm">جاوب</button></div></div>`;
  if(rTurn.length) loops+=`<div class="card click" data-gor="${rTurn[0].id}"><span class="pill mine">مادة لسه ما خلّصتهاش</span><p class="q" style="margin-top:10px">${esc(rTurn[0].title)}</p><div class="row"><span class="pill wait">${esc(STATUS[prog(rTurn[0].id,me)])}</span><button class="act primary sm">افتح</button></div></div>`;
  if(!loops) loops=`<div class="empty"><b>مفيش حلقات مفتوحة 🌿</b>إنت متابع كل حاجة من ناحيتك. تقدر تبدأ سؤال جديد أو تضيف مادة.</div>`;
  return `<h1 class="page">أهلًا يا ${USERS[me]}</h1>
    <p class="lede">ده اللي مستني دورك — سكن بيجيبلك المهم، ما بيدفعش عليك إشعارات.</p>
    ${loops}
    <div class="cat">سؤال للنقاش</div>
    <div class="card click" data-goq="${weekly.id}"><p class="q">${esc(weekly.q)}</p><div class="row"><span class="pill wait">${esc(weekly.cat)}</span><button class="act ghost sm">للحوار</button></div></div>`;
}

// ---------- المكتبة ----------
function viewLibrary(){
  const items=state.resources.map(r=>{
    const mp=prog(r.id,me),pp=prog(r.id,partner());
    return `<div class="card click" data-gor="${r.id}">
      <p class="q" style="margin-bottom:8px">${esc(r.title)}</p>
      <p class="lede" style="margin:0 0 6px">${esc(r.desc)}</p>
      <div class="ticks">
        <span class="tick">${USERS.m}: <b>${esc(STATUS[prog(r.id,'m')])}</b></span>
        <span class="tick">${USERS.d}: <b>${esc(STATUS[prog(r.id,'d')])}</b></span>
      </div></div>`;
  }).join("");
  return `<h1 class="page">المكتبة</h1>
    <p class="lede">الموارد اللي بتتعلّموا منها سوا. الحالة بتتسجّل لكل واحد لوحده.</p>
    <div class="row" style="margin-bottom:14px"><span></span><button class="act gold sm" id="add-res">+ أضف مورد</button></div>
    ${items||'<div class="empty"><b>المكتبة فاضية</b>أضف أول مورد عشان تبدأوا.</div>'}`;
}

// ---------- تفاصيل المورد (بدون تعليقات) ----------
function viewDetail(id){
  const r=state.resources.find(x=>x.id===id);if(!r)return viewLibrary();
  const st=prog(id,me);
  const sumHtml=state.summaries[id]
    ? `<p class="lede" style="margin-top:8px">${esc(state.summaries[id])}</p>`
    : `<div class="note">الملخّص يتولّد بالـ AI من الباك-إند. هنا زر تجريبي بيحط ملخّص وهمي للعرض.</div><button class="act ghost sm" id="gen-sum" style="margin-top:8px">ولّد ملخّص وأسئلة (تجريبي)</button>`;
  return `<button class="back">← المكتبة</button>
    <h1 class="page">${esc(r.title)}</h1>
    <p class="lede">${esc(r.desc)} · <a class="link" href="${esc(r.url)}" target="_blank" rel="noopener">افتح المصدر ↗</a></p>

    <div class="cat">حالتك</div>
    <div class="status-seg" id="st">
      ${Object.keys(STATUS).map(k=>`<button data-st="${k}" aria-pressed="${st===k}">${STATUS[k]}</button>`).join("")}
    </div>

    <div class="cat">ملخّص ذكي</div>
    <div class="card">${sumHtml}</div>

    <div class="cat">ملاحظات مشتركة</div>
    <div class="card"><textarea id="shared" placeholder="ملاحظة يشوفها الطرفان ويعدّلانها.">${esc(r.sharedNote)}</textarea>
      <div class="row" style="margin-top:8px"><span></span><button class="act primary sm" id="save-shared">احفظ المشتركة</button></div></div>

    <div class="cat">ملاحظاتك الخاصة</div>
    <div class="card"><textarea id="priv" placeholder="تظهر لك وحدك يا ${USERS[me]}.">${esc(pNote(id,me))}</textarea>
      <div class="row" style="margin-top:8px"><span></span><button class="act primary sm" id="save-priv">احفظ الخاصة</button></div></div>`;
}

// ---------- مركز الحوار (الكشف المزدوج) ----------
function viewDialogue(){
  const byCat={};QUESTIONS.forEach(x=>(byCat[x.cat]=byCat[x.cat]||[]).push(x));
  let html=`<h1 class="page">مركز الحوار</h1><p class="lede">كل واحد يجاوب لوحده. الإجابتين تظهروا سوا بس لما تكونوا جاوبتوا الاتنين، وبعدها تحوّلوا الاتفاق لقرار.</p>`;
  for(const c in byCat){html+=`<div class="cat">${esc(c)}</div>`;byCat[c].forEach(x=>html+=qCard(x))}
  return html;
}
let activeQ=null;
function qCard(x){
  const rv=canReveal(x.id),open=activeQ===x.id;
  let pill;
  if(rv)pill=`<span class="pill done">✓ اتكشفت</span>`;
  else if(myAns(x.id))pill=`<span class="pill wait">مستني ${USERS[partner()]}</span>`;
  else if(aAns(x.id))pill=`<span class="pill ready">دورك تجاوب</span>`;
  else pill=`<span class="pill wait">مستني الاتنين</span>`;
  let body;
  if(rv){
    body=`<div class="reveal"><div class="ans"><p class="who">${USERS.m}</p><p class="txt">${esc(state.answers[x.id].m)}</p></div>
      <div class="ans"><p class="who">${USERS.d}</p><p class="txt">${esc(state.answers[x.id].d)}</p></div></div>
      <div class="row" style="margin-top:13px">
        ${state.discussed[x.id]?'<span class="pill done">تمت المناقشة</span>':`<button class="act ghost sm" data-disc="${x.id}">تمت المناقشة شفهيًا</button>`}
        <button class="act gold sm" data-decide="${x.id}">حوّلوا الاتفاق لقرار</button></div>`;
  }else if(open){
    body=`<div class="answer-box"><textarea id="ta-${x.id}" placeholder="إجابتك خاصة، ومش هتظهر لـ${USERS[partner()]} غير لما يجاوب.">${esc(myAns(x.id)||"")}</textarea>
      <div class="row" style="margin-top:10px"><button class="act ghost sm" data-cancel="1">إلغاء</button><button class="act primary sm" data-save="${x.id}">احفظ إجابتي</button></div></div>`;
  }else{
    body=`<div class="row"><span></span><button class="act primary sm" data-answer="${x.id}">${myAns(x.id)?"عدّل إجابتك":"جاوب"}</button></div>`;
  }
  return `<div class="card"><p class="q">${esc(x.q)}</p><div class="row" style="margin-bottom:${open||rv?'4px':'0'}">${pill}<span></span></div>${body}</div>`;
}

// ---------- سجل القرارات (بدون شارات) ----------
let decFilter="all";
function viewDecisions(){
  let list=state.decisions;
  if(decFilter==="open")list=list.filter(d=>!d.done);
  if(decFilter==="done")list=list.filter(d=>d.done);
  const filt=`<div class="seg" id="decfilter" style="margin-bottom:16px">
    ${[["all","الكل"],["open","قيد التنفيذ"],["done","تم"]].map(([k,l])=>`<button data-f="${k}" aria-pressed="${decFilter===k}">${l}</button>`).join("")}</div>`;
  const body=list.length?list.map(d=>`<div class="card">
      <p class="lede" style="margin:0 0 6px">من حوار: ${esc(d.qText)}</p>
      <p class="q" style="margin:0 0 10px">${esc(d.text)}</p>
      <div class="row"><label class="row" style="gap:9px;cursor:pointer"><input type="checkbox" class="chk" data-done="${d.id}" ${d.done?"checked":""}><span class="pill ${d.done?'done':'mine'}">${d.done?'تم':'قيد التنفيذ'}</span></label>
      <span class="pill wait">المسؤول: ${esc(d.owner)}</span></div></div>`).join("")
    :`<div class="empty"><b>لسه مفيش قرارات</b>كل حوار بتكمّلوه وتتفقوا فيه، حوّلوه لقرار من مركز الحوار.</div>`;
  return `<h1 class="page">سجل القرارات</h1><p class="lede">القرار أهم من الملاحظة. ده اللي اتفقتوا عليه فعلًا.</p>${filt}${body}`;
}

// ---------- الإعدادات ----------
function viewSettings(){
  return `<h1 class="page">الإعدادات</h1><p class="lede">الخصوصية أولًا. بياناتكوا ملككوا، وتقدروا تصدّروها أو تمسحوها وقت ما تحبوا.</p>
    <div class="cat">بياناتك</div>
    <div class="card"><p class="lede" style="margin:0 0 10px">صدّر كل بياناتكوا (الموارد، الملاحظات، الإجابات، القرارات) في ملف JSON واحد.</p>
      <button class="act primary sm" id="export">صدّر بياناتي (JSON)</button></div>
    <div class="cat">الحساب</div>
    <div class="card"><div class="note">تغيير كلمة المرور وحذف الحساب يتمّوا عبر Firebase Auth في التطبيق الحقيقي.</div>
      <div class="row" style="margin-top:10px"><button class="act ghost sm" disabled>تغيير كلمة المرور</button><button class="act ghost sm" disabled>حذف الحساب وبياناته</button></div></div>`;
}

// ====================== الأحداث (تفويض من #view) ======================
$("#view").addEventListener("click",e=>{
  const t=e.target.closest("button,[data-goq],[data-gor],.back");if(!t)return;
  // تنقّل
  if(t.classList.contains("back")){go("library");return}
  if(t.dataset.goq!==undefined){activeQ=t.dataset.goq;go("dialogue");return}
  if(t.dataset.gor!==undefined){go("library",t.dataset.gor);return}
  // مكتبة
  if(t.id==="add-res"){addResource();return}
  // تفاصيل
  if(t.dataset.st){(state.progress[route.id]=state.progress[route.id]||{})[me]=t.dataset.st;render();return}
  if(t.id==="gen-sum"){state.summaries[route.id]="ملخّص تجريبي: النقاط الأساسية للمصدر، تليها أسئلة مقترحة للنقاش بينكما. (يُستبدل بمخرجات الـ AI الحقيقية.)";render();return}
  if(t.id==="save-shared"){const r=state.resources.find(x=>x.id===route.id);r.sharedNote=$("#shared").value.trim();flash(t,"اتحفظت");return}
  if(t.id==="save-priv"){(state.privateNotes[route.id]=state.privateNotes[route.id]||{})[me]=$("#priv").value.trim();flash(t,"اتحفظت");return}
  // حوار
  if(t.dataset.answer){activeQ=t.dataset.answer;render();setTimeout(()=>$("#ta-"+activeQ)?.focus(),0);return}
  if(t.dataset.cancel){activeQ=null;render();return}
  if(t.dataset.save){const id=t.dataset.save,val=$("#ta-"+id).value.trim();if(!val){$("#ta-"+id).focus();return}(state.answers[id]=state.answers[id]||{})[me]=val;activeQ=null;render();return}
  if(t.dataset.disc){state.discussed[t.dataset.disc]=true;render();return}
  if(t.dataset.decide){makeDecision(t.dataset.decide);return}
  // إعدادات
  if(t.id==="export"){exportJSON();return}
});
$("#view").addEventListener("change",e=>{
  const c=e.target.closest("input[data-done]");if(c){const d=state.decisions.find(x=>x.id===c.dataset.done);if(d)d.done=c.checked;render();return}
  const f=e.target.closest("#decfilter button");if(f){decFilter=f.dataset.f;render()}
});
$("#view").addEventListener("click",e=>{const f=e.target.closest("#decfilter button");if(f){decFilter=f.dataset.f;render()}});

function flash(btn,msg){const o=btn.textContent;btn.textContent=msg;btn.disabled=true;setTimeout(()=>{btn.textContent=o;btn.disabled=false},900)}
function addResource(){const title=prompt("عنوان المورد:");if(!title)return;const url=prompt("الرابط:","https://")||"";const desc=prompt("وصف مختصر:")||"";state.resources.push({id:"r"+Date.now(),title:title.trim(),url:url.trim(),desc:desc.trim(),sharedNote:""});render()}
function makeDecision(qId){const q=QUESTIONS.find(x=>x.id===qId);const text=prompt(`القرار اللي اتفقتوا عليه بخصوص:\n«${q.q}»`);if(!text||!text.trim())return;const owner=prompt("مين المسؤول؟ (مصطفى / ضحى / الاتنين)","الاتنين")||"الاتنين";state.decisions.unshift({id:"d"+Date.now(),qId,qText:q.q,text:text.trim(),owner:owner.trim(),done:false});go("decisions")}
function exportJSON(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="sakan-export.json";a.click();URL.revokeObjectURL(a.href)}

render();
</script>
</body>
</html>
