<!-- ════ Theme init (before render) ════ -->
<script>(function(){try{var t=localStorage.getItem('sakan_theme')||'light';document.documentElement.setAttribute('data-theme',['light','dark','oled'].indexOf(t)>=0?t:'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ── Thmanyah fonts — served same-origin from /fonts ── */
  @font-face{font-family:'ThmanyahSans';src:url('/fonts/thmanyahsans-Regular.otf') format('opentype');font-weight:400;font-display:swap}
  @font-face{font-family:'ThmanyahSans';src:url('/fonts/thmanyahsans-Bold.otf') format('opentype');font-weight:700;font-display:swap}
  @font-face{font-family:'ThmanyahSans';src:url('/fonts/thmanyahsans-Black.otf') format('opentype');font-weight:900;font-display:swap}
  @font-face{font-family:'ThmanyahSerifDisplay';src:url('/fonts/thmanyahserifdisplay-Bold.otf') format('opentype');font-weight:700;font-display:swap}

  :root{
    --brand-deep:#0e3b2e; --brand-mid:#1a5d47; --brand-soft:#2a7a5f; --brand-gold:#c9a14a; --brand-gold-lt:#e6c97a;
    --bg:#faf6ec; --surface:#ffffff; --card-2:#f7f3ea; --sand:#f5ecd9; --sand-2:#ebdfc4;
    --green-pale:#e8f4ef; --gold-pale:#fdf5e0;
    --ink:#10241d; --muted:#56635c; --muted-2:#7c8c7e;
    --primary:#1a5d47; --primary-ink:#0e3b2e; --primary-soft:#e8f4ef;
    --accent:#c9a14a; --accent-soft:#fdf5e0; --accent-ink:#8a6822;
    --field-bg:#fcfbf9; --line:rgba(14,59,46,.10);
    --radius:18px; --radius-sm:12px;
    --shadow:0 10px 30px -12px rgba(14,59,46,.18); --shadow-sm:0 4px 14px -6px rgba(14,59,46,.12); --shadow-gold:0 8px 24px -8px rgba(201,161,74,.35);
    --t:.25s; --ease:cubic-bezier(.4,0,.2,1); --header-bg:rgba(250,246,236,.82);
  }
  html[data-theme="dark"]{
    --bg:#0a0f0c; --surface:#111a14; --card-2:#162019; --sand:#1c2a1e; --sand-2:#1a2618;
    --green-pale:#0d1f12; --gold-pale:#1a1608;
    --ink:#d8ead8; --muted:#7a9a7a; --muted-2:#4a6a4a;
    --primary:#3dcc5e; --primary-ink:#4dd866; --primary-soft:rgba(77,216,102,.12);
    --accent:#e6c97a; --accent-soft:rgba(230,201,122,.12); --accent-ink:#e6c97a;
    --field-bg:#162019; --line:rgba(255,255,255,.08);
    --shadow:0 10px 30px -12px rgba(0,0,0,.6); --shadow-sm:0 4px 14px -6px rgba(0,0,0,.4); --shadow-gold:0 8px 24px -8px rgba(0,0,0,.5);
    --header-bg:rgba(10,15,12,.82);
  }
  html[data-theme="oled"]{
    --bg:#000000; --surface:#0a0a0a; --card-2:#101010; --sand:#080808; --sand-2:#0d0d0d;
    --green-pale:#040a05; --gold-pale:#0a0800;
    --ink:#f5fef6; --muted:#b8cfba; --muted-2:#7a9a7c;
    --primary:#3dcc5e; --primary-ink:#4dd866; --primary-soft:rgba(77,216,102,.12);
    --accent:#f0d080; --accent-soft:rgba(240,208,128,.12); --accent-ink:#f0d080;
    --field-bg:#101010; --line:rgba(255,255,255,.10);
    --shadow:0 10px 30px -12px rgba(0,0,0,.85); --shadow-sm:0 4px 14px -6px rgba(0,0,0,.7); --shadow-gold:0 8px 24px -8px rgba(0,0,0,.7);
    --header-bg:rgba(0,0,0,.82);
  }

  *{box-sizing:border-box}
  html,body{margin:0; overflow-x:hidden}
  img{max-width:100%; height:auto}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'ThmanyahSans','Tajawal','Segoe UI',system-ui,sans-serif; font-weight:400; line-height:1.75;
    -webkit-font-smoothing:antialiased; transition:background var(--t) var(--ease), color var(--t) var(--ease);
  }
  .display{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif}
  .wrap{max-width:720px; margin:0 auto; padding:0 20px 90px}
  a{color:var(--primary); text-decoration:none}

  header{position:sticky; top:0; z-index:20; background:transparent; border:none; padding:10px 12px 6px}
  .bar{max-width:760px; margin:0 auto; padding:8px 14px; display:flex; align-items:center; gap:10px; background:var(--header-bg); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--line); border-radius:999px; box-shadow:var(--shadow-sm)}
  .mark{flex:none; white-space:nowrap; font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-weight:700; font-size:23px; color:var(--primary-ink); letter-spacing:.5px}
  .mark small{font-family:'ThmanyahSans','Tajawal',sans-serif; font-weight:300; font-size:11px; color:var(--muted); display:block; margin-top:-3px; letter-spacing:0; white-space:nowrap}
  .bar-actions{flex:1; min-width:0; display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); flex-wrap:nowrap; justify-content:flex-end; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; -webkit-overflow-scrolling:touch}
  .bar-actions::-webkit-scrollbar{display:none}
  .bar-actions>*{flex:none}
  .greet{text-align:center; padding:30px 22px}
  .greet .hi{color:var(--muted); font-size:13px; letter-spacing:2px}
  .namecal{display:flex; justify-content:center; margin:8px 0 2px; color:#00104a}
  .namecal svg{height:74px; width:auto; max-width:80%}
  [data-theme="dark"] .namecal,[data-theme="oled"] .namecal{color:#fff}
  .namecal .namefallback{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-size:36px; font-weight:700; color:var(--primary-ink); line-height:1.2}
  @media(max-width:560px){ .namecal svg{height:56px} .namecal .namefallback{font-size:30px} }
  .brandcal{display:inline-flex; align-items:center; vertical-align:middle; margin-inline-start:9px; color:#00104a}
  .brandcal svg{height:22px; width:auto}
  [data-theme="dark"] .brandcal,[data-theme="oled"] .brandcal{color:#fff}
  /* الموبايل: اسم الشخص في نص الهدر */
  @media(max-width:768px){
    .bar{position:relative}
    .mark{position:absolute; left:50%; transform:translateX(-50%); margin:0; gap:0}
    .brandword, .mark small{display:none}
    .brandcal{display:inline-flex !important; margin:0}
    .brandcal svg{height:27px}
  }
  /* ===== الهامبرجر + الدرّ هو المنيو ===== */
  .hamburger{display:flex; align-items:center; justify-content:center; flex:none; background:var(--primary-soft); border:none; color:var(--ink); font-size:22px; cursor:pointer; width:42px; height:42px; border-radius:12px; line-height:1}
  .hamburger:hover{filter:brightness(.96)}
  .bar-actions{display:none}
  /* ===== الديسكتوب: كويك أكسيس + ثيم ===== */
  @media(min-width:769px){
    .bar-actions{display:flex; gap:6px; align-items:center}
    .drawer{width:360px} .dw-link{font-size:17px; padding:14px 16px}
  }
  .qa{display:flex; gap:2px; align-items:center}
  .qa-link{background:transparent; border:none; color:var(--ink); font-family:inherit; font-size:14px; font-weight:700; padding:8px 11px; border-radius:10px; cursor:pointer; white-space:nowrap}
  .qa-link:hover{background:var(--primary-soft)}
  .qa-link.on{background:var(--primary-soft); color:var(--primary-ink)}
  .qa-theme{display:inline-flex; gap:3px; margin-inline-start:6px; padding-inline-start:8px; border-inline-start:1px solid var(--line)}
  .qa-theme button{background:transparent; border:none; color:var(--ink); font-size:15px; width:34px; height:32px; border-radius:8px; cursor:pointer}
  .qa-theme button:hover{background:var(--primary-soft)}
  .qa-theme button.on{background:var(--primary-soft)}
  /* ===== محوّل البلاي ليست + رؤوس الكاتيجوريز ===== */
  .pl-seg{display:flex; gap:8px; margin:16px 0 6px}
  .pl-seg button{flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px 10px; border-radius:14px; border:1.5px solid var(--line); background:var(--surface); color:var(--ink); font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; white-space:nowrap}
  .pl-seg button:hover{border-color:var(--brand-gold)}
  .pl-seg button.on{background:linear-gradient(135deg,var(--brand-mid),var(--brand-deep)); color:#fff; border-color:transparent; box-shadow:0 6px 18px -8px rgba(14,59,46,.5)}
  .pl-seg .pl-ic{font-size:14px; color:#e23} .pl-seg .pl-ic.tg{color:#2a7ab0} .pl-seg button.on .pl-ic{color:#fff}
  .pl-seg .pl-n{background:rgba(0,0,0,.12); border-radius:99px; padding:1px 9px; font-size:13px} .pl-seg button.on .pl-n{background:rgba(255,255,255,.2)}
  .cat-h{display:flex; align-items:center; gap:12px; margin:26px 0 12px; padding-bottom:10px; border-bottom:2px solid var(--line)}
  .cat-ic{font-size:22px; width:46px; height:46px; flex:none; display:flex; align-items:center; justify-content:center; background:var(--gold-pale,#fdf5e0); border:1px solid var(--brand-gold); border-radius:13px}
  .cat-t{font-size:17px; font-weight:800; color:var(--ink)}
  .cat-s{font-size:12.5px; color:var(--muted); margin-top:2px}
  .hintbox{background:var(--gold-pale,#fdf5e0); border:1px solid var(--line); border-radius:12px; padding:8px 14px; margin:10px 0 6px}
  .hintbox summary{cursor:pointer; font-weight:700; color:var(--primary-ink); font-size:13.5px; padding:4px 0; list-style:none}
  .hintbox summary::-webkit-details-marker{display:none}
  [data-theme="dark"] .hintbox,[data-theme="oled"] .hintbox{background:rgba(201,161,74,.08)}
  /* ===== الدرج الجانبي (تقسيم زي زاد) ===== */
  .drawer-bg{position:fixed; inset:0; background:rgba(6,23,15,.55); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .25s; z-index:998}
  .drawer-bg.open{opacity:1; pointer-events:auto}
  .drawer{position:fixed; top:0; bottom:0; right:0; width:312px; max-width:86vw; z-index:999;
    background:radial-gradient(circle 360px at 88% -4%, rgba(201,161,74,.18), transparent 62%), linear-gradient(180deg,#0b3024,#1a5d47);
    color:#f4ecd6; box-shadow:-12px 0 44px rgba(0,0,0,.4); overflow-y:auto; padding:14px 12px 30px;
    transform:translateX(112%); transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .drawer.open{transform:none}
  .dw-head{display:flex; align-items:center; justify-content:space-between; padding:6px 8px 12px; margin-bottom:4px; border-bottom:1px solid rgba(201,161,74,.25)}
  .dw-brand{font-family:'ThmanyahSerifDisplay',serif; font-size:26px; font-weight:700; color:#fff}
  .dw-x{background:rgba(255,255,255,.12); border:none; color:#fff; width:34px; height:34px; border-radius:50%; font-size:16px; cursor:pointer}
  .dw-code{font-size:11.5px; color:rgba(244,236,214,.7); padding:0 10px 8px}
  .dw-sep{display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; letter-spacing:.5px; color:#e6c97a; padding:15px 10px 7px; cursor:pointer; user-select:none}
  .dw-sep::after{content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(230,201,122,.35),transparent)}
  .dw-sep .dw-arrow{font-size:11px; transition:transform .25s}
  .dw-sep.collapsed .dw-arrow{transform:rotate(-90deg)}
  .dw-group{overflow:hidden; transition:max-height .3s ease, opacity .25s; max-height:700px}
  .dw-group.collapsed{max-height:0; opacity:0}
  .dw-link{width:100%; display:flex; align-items:center; gap:12px; padding:13px 14px; margin:3px 0; border:none; border-radius:13px; background:transparent; color:#f4ecd6; font-family:inherit; font-size:16px; font-weight:600; cursor:pointer; text-align:start; transition:background .2s}
  .dw-link:hover{background:rgba(255,255,255,.1); color:#fff}
  .dw-link.active{background:linear-gradient(135deg,rgba(201,161,74,.28),rgba(42,122,95,.22)); color:#fff; font-weight:800; box-shadow:inset 0 0 0 1px rgba(201,161,74,.4)}
  .dw-ico{font-size:18px; width:34px; height:34px; flex:none; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.1); border-radius:10px}
  .dw-link.active .dw-ico{background:linear-gradient(135deg,#c9a14a,#1f5e4b)}
  .drawer .dw-theme{display:inline-flex; gap:6px; background:rgba(255,255,255,.08); padding:5px; border-radius:12px}
  .drawer .dw-theme button{background:transparent; border:none; color:#f4ecd6; font-size:16px; width:40px; height:34px; border-radius:9px; cursor:pointer}
  .drawer .dw-theme button.on{background:rgba(201,161,74,.32)}
  /* ===== شاشة الدخول (Auth) الفخمة ===== */
  :root{ --auth-img:url('/media/auth-bg.jpg'); }
  body.pre-auth{
    background:
      linear-gradient(180deg, rgba(6,20,13,.28) 0%, rgba(6,20,13,.48) 52%, rgba(6,20,13,.80) 100%),
      var(--auth-img, none),
      radial-gradient(circle 540px at 84% -8%, rgba(201,161,74,.22), transparent 60%),
      radial-gradient(circle 680px at 2% 108%, rgba(42,122,95,.30), transparent 60%),
      linear-gradient(165deg,#0b3024 0%, #134135 55%, #0b3024 100%);
    background-size: cover, cover, auto, auto, auto;
    background-position: center center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  body.pre-auth header, body.pre-auth #foot{ display:none !important; }
  body.pre-auth #app{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 14px; }
  .auth{ width:100%; max-width:430px; margin:0 auto; animation:authIn .5s cubic-bezier(.22,.68,0,1) both; }
  @keyframes authIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .auth-brand{ text-align:center; margin-bottom:18px; }
  .auth-logo{ font-family:'ThmanyahSerifDisplay',serif; font-size:56px; font-weight:700; color:#fff; line-height:1; text-shadow:0 6px 28px rgba(0,0,0,.35); }
  .auth-tag{ color:rgba(244,236,214,.88); font-size:14px; margin:10px 0 0; }
  .auth-card{ background:rgba(10,28,20,.62); -webkit-backdrop-filter:blur(22px); backdrop-filter:blur(22px); border:1px solid rgba(255,255,255,.14); border-radius:30px; padding:28px 24px 26px; box-shadow:0 28px 64px -18px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.12); }
  .auth-tabs{ display:flex; gap:4px; background:rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.12); border-radius:16px; padding:5px; margin-bottom:20px; }
  .auth-tab{ flex:1; border:none; background:transparent; color:rgba(244,236,214,.82); font-family:inherit; font-size:13.5px; font-weight:800; padding:11px 6px; border-radius:12px; cursor:pointer; transition:all .2s; }
  .auth-tab.on{ background:linear-gradient(135deg,#c9a14a,#e6c97a); color:#1e3a2f; box-shadow:0 5px 14px -4px rgba(201,161,74,.55); }
  .auth-field{ display:flex; align-items:center; gap:10px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.18); border-radius:40px; padding:0 18px; margin-bottom:13px; transition:border-color .2s, box-shadow .2s, background .2s; }
  .auth-field:focus-within{ border-color:#e6c97a; background:rgba(255,255,255,.2); box-shadow:0 0 0 3px rgba(201,161,74,.3); }
  .auth-field .af-ico{ font-size:15px; flex:none; opacity:.85; }
  .auth-field input{ flex:1; min-width:0; border:none; background:transparent; padding:14px 0; font-family:inherit; font-size:15px; color:#fff; outline:none; }
  .auth-field input::placeholder{ color:rgba(244,236,214,.6); }
  .auth-field input:-webkit-autofill{ -webkit-text-fill-color:#fff; transition:background-color 9999s }
  .auth-field .af-eye{ background:none; border:none; cursor:pointer; font-size:15px; opacity:.8; padding:4px; flex:none; }
  .auth-btn{ width:100%; border:none; border-radius:40px; padding:15px; font-family:inherit; font-size:17px; font-weight:800; cursor:pointer; margin-top:8px; color:#1e3a2f; background:linear-gradient(95deg,#c9a14a,#e6c97a); box-shadow:0 12px 26px -10px rgba(0,0,0,.45); transition:transform .15s, box-shadow .2s, filter .2s; }
  .auth-btn:hover{ transform:translateY(-1px); filter:brightness(1.04); box-shadow:0 16px 32px -10px rgba(0,0,0,.55); }
  .auth-btn:active{ transform:translateY(0); }
  .auth-btn.ghost{ background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.28); }
  .auth-hint{ text-align:center; color:rgba(244,236,214,.82); font-size:13px; margin:14px 0 0; }
  .auth-hint a{ color:#f5d68a; font-weight:700; text-decoration:none; cursor:pointer; }
  .auth-hint a:hover{ text-decoration:underline; }
  .auth-foot{ text-align:center; color:rgba(244,236,214,.72); font-size:12px; margin-top:20px; }
  .auth-api{ display:block; margin:8px auto 0; color:rgba(244,236,214,.6) !important; font-size:11px; }
  .chip{background:var(--green-pale); color:var(--primary-ink); border-radius:999px; padding:5px 12px; font-size:12.5px; font-weight:500; border:1px solid var(--line); white-space:nowrap}
  .linkbtn{background:none; border:none; color:var(--muted); cursor:pointer; font:inherit; font-size:13px; white-space:nowrap}
  .linkbtn:hover{color:var(--ink)}
  .themesw{display:inline-flex; gap:2px; background:var(--card-2); border:1px solid var(--line); border-radius:999px; padding:3px}
  .themesw button{font:inherit; font-size:13px; line-height:1; border:none; background:none; cursor:pointer; width:30px; height:26px; border-radius:999px; color:var(--muted); display:grid; place-items:center; transition:background .15s}
  .themesw button.on{background:var(--surface); box-shadow:var(--shadow-sm)}

  h1{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-weight:700; font-size:31px; margin:30px 0 6px; line-height:1.3; color:var(--ink)}
  h2{font-family:'ThmanyahSans','Tajawal',sans-serif; font-weight:900; font-size:21px; margin:0 0 14px; color:var(--ink)}
  .lede{color:var(--muted); margin:0 0 26px; font-weight:300}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:16px; transition:background var(--t) var(--ease), border-color var(--t) var(--ease)}
  .card.tight{padding:16px 18px}
  .eyebrow{font-size:11.5px; letter-spacing:1.5px; color:var(--accent-ink); text-transform:uppercase; font-weight:700; margin-bottom:8px}

  label{display:block; font-size:13.5px; color:var(--muted); margin:0 0 7px}
  input[type=text], textarea, .field{
    width:100%; font:inherit; color:var(--ink); background:var(--field-bg);
    border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; outline:none; transition:border-color .15s, box-shadow .15s;
  }
  textarea{resize:vertical; min-height:84px}
  input:focus, textarea:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft)}
  .row{margin-bottom:14px}
  button.btn{
    font:inherit; font-weight:700; cursor:pointer; border-radius:var(--radius-sm); padding:11px 20px; border:1px solid transparent;
    background:var(--primary); color:#fff; transition:transform .04s, background .15s, box-shadow .15s, opacity .15s; box-shadow:var(--shadow-sm);
  }
  button.btn:hover{background:var(--primary-ink)}
  button.btn:active{transform:translateY(1px)}
  button.btn:disabled{opacity:.45; cursor:not-allowed}
  button.btn.ghost{background:transparent; color:var(--primary); border-color:var(--line); box-shadow:none}
  button.btn.ghost:hover{background:var(--primary-soft)}
  button.btn.soft{background:var(--primary-soft); color:var(--primary-ink); box-shadow:none}
  button.btn.accent{background:linear-gradient(135deg,var(--brand-gold),var(--brand-gold-lt)); color:#3a2c00; box-shadow:var(--shadow-gold)}
  button.btn.accent:hover{filter:brightness(1.04)}
  button.btn.sm{padding:8px 14px; font-size:13.5px}
  .actions{display:flex; gap:10px; flex-wrap:wrap; align-items:center}

  .pill{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; padding:4px 11px; border-radius:999px; background:var(--green-pale); color:var(--primary-ink)}
  .pill.warn{background:var(--gold-pale); color:var(--accent-ink)}
  .pill.dot::before{content:""; width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.75}

  .res{display:flex; justify-content:space-between; align-items:center; gap:14px; cursor:pointer; transition:transform .12s var(--ease), box-shadow .15s}
  .res:hover{transform:translateY(-2px); box-shadow:var(--shadow)}
  .res:hover h2{color:var(--primary)}
  .res h2{margin:0}
  .res .meta{font-size:13px; color:var(--muted)}

  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin:22px 0}
  .tab{font:inherit; font-size:15px; font-weight:500; background:none; border:none; cursor:pointer; color:var(--muted); padding:10px 14px; border-bottom:2px solid transparent; margin-bottom:-1px}
  .tab.active{color:var(--primary-ink); border-bottom-color:var(--accent); font-weight:900}

  .q{border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:14px; background:var(--surface); box-shadow:var(--shadow-sm)}
  .q .qtext{font-family:'ThmanyahSerifDisplay','ThmanyahSans',serif; font-size:18px; font-weight:700; margin:0 0 14px; line-height:1.55}
  .answers{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px}
  @media(max-width:560px){ .answers{grid-template-columns:1fr} header{padding:8px 8px 4px} .bar{padding:7px 12px; gap:8px} .mark{font-size:20px} .mark small{display:none} h1{font-size:26px} }
  .ans{border:1px solid var(--line); border-radius:var(--radius-sm); padding:13px 14px; background:var(--field-bg)}
  .ans .who{font-size:12px; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:6px}
  .ans .body{white-space:pre-wrap; word-break:break-word}
  .covered{display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; color:var(--muted); background:repeating-linear-gradient(135deg,var(--sand),var(--sand) 10px,var(--card-2) 10px,var(--card-2) 20px); border-style:dashed; min-height:84px}
  .covered .lock{font-size:18px; opacity:.6}
  .revealed-glow{animation:gentle .9s ease}
  @keyframes gentle{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  @media (prefers-reduced-motion: reduce){ .revealed-glow{animation:none} }

  .empty{text-align:center; color:var(--muted); padding:40px 10px}
  .center{max-width:460px; margin:8vh auto 0}
  .or{display:flex; align-items:center; gap:12px; color:var(--muted); font-size:13px; margin:18px 0}
  .or::before,.or::after{content:""; height:1px; background:var(--line); flex:1}
  .toast{position:fixed; bottom:22px; right:50%; transform:translateX(50%); background:var(--primary-ink); color:#fff; padding:11px 18px; border-radius:var(--radius-sm); font-size:14px; box-shadow:var(--shadow); opacity:0; transition:opacity .2s; pointer-events:none; z-index:50}
  .toast.show{opacity:1}
  .codebox{font-family:'ThmanyahSans',ui-monospace,monospace; letter-spacing:3px; font-size:22px; font-weight:900; color:var(--primary-ink); background:var(--green-pale); border-radius:var(--radius-sm); padding:14px; text-align:center; border:1px dashed var(--line)}
  .muted{color:var(--muted)} .sp{height:8px} .spacer{flex:1}
  .checks label{display:flex; gap:9px; align-items:flex-start; color:var(--ink); background:var(--field-bg); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; cursor:pointer; font-size:14px}
  .checks input{margin-top:5px}
  footer.tiny{max-width:720px; margin:30px auto 0; padding:0 20px; color:var(--muted); font-size:12px; text-align:center}
  .api-edit{font-size:12px; color:var(--muted); margin-top:18px; text-align:center}
  .api-edit input{display:inline-block; width:auto; min-width:280px; font-size:12px; padding:6px 9px; margin-top:6px}

  /* ========== QuickNotes ========== */
  .qn-tabs{ display:flex; gap:6px; margin-bottom:18px; }
  .qn-tab{ flex:1; border:none; border-radius:16px; padding:13px 10px; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; transition:all .2s;
    background:rgba(255,255,255,.07); color:var(--text-muted); border:1px solid var(--line); }
  .qn-tab.on{ background:linear-gradient(135deg,rgba(201,161,74,.22),rgba(42,122,95,.18)); color:var(--text); border-color:rgba(201,161,74,.45); box-shadow:0 4px 14px -4px rgba(201,161,74,.2); }
  .qn-glass{ background:rgba(255,255,255,.05); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.11); border-radius:20px; padding:20px; margin-bottom:14px; }
  [data-theme="light"] .qn-glass{ background:rgba(255,255,255,.55); border-color:rgba(201,161,74,.18); }
  .qn-panel-label{ font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--gold); opacity:.85; margin:0 0 10px; }
  .qn-input{ width:100%; box-sizing:border-box; padding:13px 16px; border-radius:14px; font-family:inherit; font-size:14.5px; resize:vertical; min-height:90px;
    background:rgba(0,0,0,.15); border:1px solid rgba(255,255,255,.12); color:var(--text); outline:none; transition:border-color .2s, box-shadow .2s; }
  [data-theme="light"] .qn-input{ background:rgba(255,255,255,.7); border-color:rgba(201,161,74,.25); }
  .qn-input:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,161,74,.18); }
  .qn-note{ display:flex; flex-direction:column; gap:4px; padding:14px 16px; border-radius:14px;
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09); margin-bottom:10px; }
  [data-theme="light"] .qn-note{ background:rgba(255,255,255,.65); border-color:rgba(201,161,74,.18); }
  .qn-note-title{ font-weight:800; font-size:15px; color:var(--text); }
  .qn-note-body{ font-size:14px; color:var(--text-muted); white-space:pre-wrap; word-break:break-word; }
  .qn-note-meta{ font-size:11.5px; color:var(--text-muted); opacity:.6; display:flex; align-items:center; gap:8px; margin-top:4px; }
  .qn-add-row{ display:flex; gap:10px; flex-direction:column; margin-bottom:14px; }
  .qn-title-inp{ width:100%; box-sizing:border-box; padding:11px 16px; border-radius:14px; font-family:inherit; font-size:15px; font-weight:700;
    background:rgba(0,0,0,.15); border:1px solid rgba(255,255,255,.12); color:var(--text); outline:none; transition:border-color .2s, box-shadow .2s; }
  [data-theme="light"] .qn-title-inp{ background:rgba(255,255,255,.7); border-color:rgba(201,161,74,.25); }
  .qn-title-inp:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,161,74,.18); }
  .qn-del{ background:none; border:none; cursor:pointer; font-size:13px; color:var(--text-muted); opacity:.5; padding:2px 6px; border-radius:6px; transition:opacity .15s; }
  .qn-del:hover{ opacity:1; color:#e57373; }
  .qn-badge{ display:inline-flex; align-items:center; gap:4px; background:rgba(201,161,74,.15); border:1px solid rgba(201,161,74,.3); border-radius:99px; padding:2px 10px; font-size:11px; font-weight:700; color:var(--gold); }

  /* ========== Device PIN Lock ========== */
  .pin-screen{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; }
  .pin-logo{ font-family:'ThmanyahSerifDisplay',serif; font-size:52px; font-weight:700; color:#fff; line-height:1; text-shadow:0 6px 28px rgba(0,0,0,.4); margin-bottom:4px; }
  .pin-sub{ color:rgba(244,236,214,.75); font-size:13.5px; margin-bottom:28px; text-align:center; }
  .pin-name-svg{ display:flex; justify-content:center; margin:0 0 8px; }
  .pin-name-svg svg{ height:68px; width:auto; max-width:76%; filter:drop-shadow(0 4px 16px rgba(0,0,0,.4)); }
  [data-theme="light"] .pin-name-svg svg{ filter:drop-shadow(0 3px 12px rgba(0,0,0,.25)); }
  .pin-who-select{ display:flex; gap:12px; margin-bottom:28px; }
  .pin-who-btn{ flex:1; border:none; border-radius:20px; padding:18px 10px 14px; cursor:pointer; transition:all .22s; font-family:inherit;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); color:rgba(244,236,214,.85); display:flex; flex-direction:column; align-items:center; gap:10px; }
  .pin-who-btn.sel{ background:linear-gradient(145deg,rgba(201,161,74,.25),rgba(42,122,95,.2)); border-color:rgba(201,161,74,.55); color:#fff; box-shadow:0 6px 20px -6px rgba(201,161,74,.3); }
  .pin-who-btn svg{ height:56px; width:auto; max-width:130px; }
  .pin-who-name{ font-size:13px; font-weight:700; }
  .pin-card{ width:100%; max-width:360px; background:rgba(10,28,20,.62); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,.14); border-radius:28px; padding:28px 24px 24px; box-shadow:0 28px 64px -18px rgba(0,0,0,.6); }
  .pin-dots{ display:flex; justify-content:center; gap:16px; margin:12px 0 22px; }
  .pin-dot{ width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,.35); background:transparent; transition:all .15s; }
  .pin-dot.fill{ background:linear-gradient(135deg,#c9a14a,#e6c97a); border-color:#e6c97a; box-shadow:0 0 10px rgba(201,161,74,.5); }
  .pin-dot.shake{ animation:pinShake .4s cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes pinShake{ 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)} }
  .pin-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pin-key{ border:none; border-radius:16px; padding:16px 10px; font-family:'ThmanyahSerifDisplay',serif; font-size:24px; font-weight:700; cursor:pointer; transition:all .12s;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.12); color:#fff; }
  .pin-key:active{ transform:scale(.93); background:rgba(201,161,74,.35); }
  .pin-key.del{ font-family:inherit; font-size:18px; }
  .pin-key.ok{ background:linear-gradient(135deg,#c9a14a,#2a7a5f); color:#fff; font-family:inherit; font-size:15px; font-weight:800; letter-spacing:.03em; }
  .pin-hint{ text-align:center; color:rgba(244,236,214,.6); font-size:12.5px; margin-top:14px; }
  .pin-hint a{ color:#f5d68a; font-weight:700; text-decoration:none; cursor:pointer; }
  .pin-hint a:hover{ text-decoration:underline; }
  .pin-err{ color:#ff8a80; font-size:13px; text-align:center; margin:8px 0 0; min-height:18px; }
  .pin-setup-label{ color:rgba(244,236,214,.82); font-size:14px; text-align:center; margin-bottom:16px; font-weight:600; }
</style>

      method,
      headers: Object.assign({"content-type":"application/json"}, S.token?{authorization:"Bearer "+S.token}:{}),
      body: body? JSON.stringify(body): undefined,
    });
    let data=null; try{ data = await res.json(); }catch(e){}
    if(!res.ok){
      const code = data && data.error ? data.error.code : ("HTTP_"+res.status);
      if((code==="UNAUTHENTICATED" || res.status===401) && S.token){
        S.token=null; S.code=null; save(); S.view="onboarding"; render(); toast("انتهت الجلسة — سجّل دخولك تاني");
      }
      const e=new Error(code); e.code=code; e.data=data; throw e;
    }
    return data;
  }

  function pinGridHTML(){
    const keys = ["١","٢","٣","٤","٥","٦","٧","٨","٩","","٠","⌫"];
    return keys.map((k,i)=>{
      if(k==="") return `<div></div>`;
      if(k==="⌫") return `<button class="pin-key del" data-act="pinKey" data-k="del">⌫</button>`;
      const digit = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"].indexOf(k).toString();
      return `<button class="pin-key" data-act="pinKey" data-k="${digit}">${k}</button>`;
    }).join("");
  }

  function pinUpdateDots(entry){
    const dots = document.querySelectorAll(".pin-dot");
    dots.forEach((d,i)=>{ d.classList.toggle("fill", i<entry.length); });
  }

  function pinShakeDots(){
    const dots = document.querySelectorAll(".pin-dot");
    dots.forEach(d=>{ d.classList.add("shake"); setTimeout(()=>d.classList.remove("shake"),500); });
  }

  function pinHandleKey(k){
    const step = S.pinStep||"lock";
    if(k==="del"){ S.pinEntry=(S.pinEntry||"").slice(0,-1); pinUpdateDots(S.pinEntry); return; }
    S.pinEntry=(S.pinEntry||"")+k;
    pinUpdateDots(S.pinEntry);
    if(S.pinEntry.length<4) return;

    // ---- 4 digits entered ----
    const pin = S.pinEntry;
    S.pinEntry="";

    if(step==="setup1"){
      S.pinSetup1=pin; S.pinStep="setup2"; renderPinLock(); return;
    }
    if(step==="setup2"){
      if(pin!==S.pinSetup1){
        pinShakeDots();
        const e=document.getElementById("pinErr"); if(e) e.textContent="الكودان مش متطابقَين، حاول تاني";
        S.pinStep="setup1"; S.pinSetup1="";
        setTimeout(()=>renderPinLock(),700); return;
      }
      localStorage.setItem(PIN_KEY, pinHash(pin));
      document.body.classList.remove("pre-auth");
      S.pinStep="lock"; S.view="home"; render(); return;
    }
    if(step==="lock"){
      if(pinCorrect(pin)){
        document.body.classList.remove("pre-auth");
        S.pinStep="lock"; S.view="home"; render(); return;
      }
      pinShakeDots();
      const e=document.getElementById("pinErr"); if(e) e.textContent="كود غلط — حاول تاني";
      setTimeout(()=>pinUpdateDots(""),700);
    }
  }

### 1. ملخص تحليلي مفصل
(الفكرة المحورية، البنية الرئيسية، الحجج والأدلة، الخلاصة. حتى 300 كلمة.)

### 2. أهم الأفكار والدروس
(7–10 نقاط، كل نقطة مبدأ يمكن للزوجين التأمل فيه وتطبيقه.)

### 3. أسئلة للنقاش العميق بين الزوجين
(5–7 أسئلة مفتوحة تشجّع على التأمل الذاتي، تبادل وجهات النظر، كشف التوقعات، تحديد التوافق/الاختلاف، والتخطيط. تجنّب أسئلة نعم/لا.)

### 4. تطبيقات عملية متعددة الأوجه
(5–8 تطبيقات: أفعال فردية، أنشطة زوجية مشتركة، ونقاط لاتخاذ القرار.)`;

  function resCard(r){
    return `<div class="card res" data-open="${esc(r.id)}">
      <div style="display:flex;gap:14px;align-items:center;flex:1;min-width:0">
        ${ r.thumbnail ? `<img src="${esc(r.thumbnail)}" alt="" loading="lazy" style="width:104px;height:62px;object-fit:cover;border-radius:10px;flex:none">` : `<span style="font-size:22px;flex:none">${TYPE_ICON[r.type]||"📄"}</span>` }
        <div style="min-width:0"><h2 style="margin:0;font-size:17px">${ytMark(r)}${esc(r.title)}</h2><div class="meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.link?esc(r.link):"بدون رابط"}</div></div>
      </div>
      <div style="display:flex;gap:6px;flex:none;align-items:center">${r.priority?`<span class="pill warn">${PRIO_AR[r.priority]||esc(r.priority)}</span>`:""}${dualProg(r.prog)}</div>
    </div>`;
  }
  function doSearch(q, items, questions, decisions){
    const box=document.getElementById("searchResults"), list=document.getElementById("list"), lc=document.getElementById("libListWrap");
    q=(q||"").trim().toLowerCase();
    if(!q){ if(box) box.innerHTML=""; if(lc) lc.style.display=""; return; }
    if(lc) lc.style.display="none";
    const hit=(s)=> String(s||"").toLowerCase().includes(q);
    const ri=items.filter(r=> hit(r.title)||hit(r.speaker)||hit(r.purpose)||hit(r.link));
    const qi=(questions||[]).filter(x=> hit(x.text));
    const di=(decisions||[]).filter(x=> hit(x.title)||hit(x.context)||hit(x.summary));
    let html="";
    if(ri.length) html += `<div class="eyebrow" style="margin-top:14px">موارد (${ri.length})</div>`+ri.map(resCard).join("");
    if(qi.length) html += `<div class="eyebrow" style="margin-top:16px">أسئلة نقاش (${qi.length})</div>`+qi.map(x=>`<div class="card res" data-openq="${esc(x.resourceId)}"><div style="flex:1;min-width:0">💬 ${esc(x.text)}</div></div>`).join("");
    if(di.length) html += `<div class="eyebrow" style="margin-top:16px">قرارات (${di.length})</div>`+di.map(x=>`<div class="card res" data-act="decisionlog"><div style="flex:1;min-width:0">✅ ${esc(x.title||x.context||"قرار")}</div></div>`).join("");
    if(!html) html = `<div class="empty" style="margin-top:12px">مفيش نتائج لـ «${esc(q)}».</div>`;
    if(box) box.innerHTML = html;
  }

  function ytEmbed(link){
    link = link||"";
    const v = link.match(/(?:youtu\.be\/|[?&]v=)([\w-]{6,})/);
    if(v) return "https://www.youtube.com/embed/"+v[1];
    const p = link.match(/[?&]list=([\w-]+)/);
    if(p && /youtube\.com\/playlist/.test(link)) return "https://www.youtube.com/embed/videoseries?list="+p[1];
    return null;
  }

  async function renderDiscussion(){
    const t = document.getElementById("tab");
    const qs = S.detail.questions || [];
    if(!qs.length){
      t.innerHTML = `<div class="card"><div class="eyebrow">الحوار</div>
        <p class="muted">لا توجد أسئلة بعد. ولِّد أسئلة نقاش من الملخص، أو أضِف سؤالك الخاص.</p>
        <div class="actions" style="margin-top:10px">
          <button class="btn" data-act="genQuestions">وَلِّد أسئلة للنقاش</button>
        </div></div>
        <div class="card tight"><div class="row"><label>أضِف سؤالًا بنفسك</label><input id="qNew" type="text" placeholder="اكتب سؤالًا…"></div><button class="btn ghost sm" data-act="addQ">أضِف السؤال</button></div>`;
      return;
    }
    t.innerHTML = `<div id="qs"><div class="empty">…تحميل الإجابات</div></div>
      <div class="card tight"><div class="row"><label>أضِف سؤالًا</label><input id="qNew" type="text" placeholder="اكتب سؤالًا…"></div><button class="btn ghost sm" data-act="addQ">أضِف السؤال</button></div>`;
    // load each question's responses
    const data = await Promise.all(qs.map(q=> api("GET","/questions/"+q.id+"/responses").then(r=>({q,r})).catch(()=>({q,r:{questionState:q.state,mine:null,partner:null}}))));
    document.getElementById("qs").innerHTML = data.map(({q,r})=>{
      const st = r.questionState;
      const locked = st==="revealed" || st==="decided";
      const mine = r.mine? r.mine.text : "";
      const partnerCell = (locked && r.partner)
        ? `<div class="ans revealed-glow"><div class="who"><span class="pill" style="background:var(--accent-soft);color:#7c4b5b">الطرف الآخر</span></div><div class="body">${esc(r.partner.text)}</div></div>`
        : `<div class="ans covered"><div class="lock">۝</div><div>إجابة الطرف الآخر مخفية<br>حتى تجيبا كلاكما</div></div>`;
      return `<div class="q" data-q="${esc(q.id)}">
        <p class="qtext">${esc(q.text)}</p>
        <span class="pill dot ${locked?'':'warn'}">${STATE_AR[st]||esc(st)}</span>
        <div class="answers">
          <div class="ans">
            <div class="who">إجابتك</div>
            <textarea class="myans" ${locked?'disabled':''} placeholder="${locked?'':'اكتب إجابتك بصدق…'}">${esc(mine)}</textarea>
            ${locked? '' : `<div style="margin-top:8px"><button class="btn sm" data-act="saveAns" data-q="${esc(q.id)}">احفظ إجابتي</button></div>`}
          </div>
          ${partnerCell}
        </div>
        ${ st==="ready_to_reveal" ? `<div class="actions" style="margin-top:12px"><button class="btn accent sm" data-act="reveal" data-q="${esc(q.id)}">اكشفا الإجابتين معًا</button></div>`
          : (st==="answered_by_one" ? `<div class="actions" style="margin-top:12px"><span class="muted" style="font-size:13px">بانتظار الطرف الآخر…</span><button class="linkbtn" data-act="force" data-q="${esc(q.id)}">اكشف الآن</button></div>` : "") }
      </div>`;
    }).join("");
  }

  const CAT_AR = { general:"عام", financial:"مالي", family:"عائلي", life:"حياتي" };
  function decCard(d, opts){
    const inResource = opts && opts.inResource;
    return `<div class="card">
        <div class="eyebrow">قرار${d.category?` · ${CAT_AR[d.category]||esc(d.category)}`:""}</div>
        <p style="font-family:'El Messiri',serif; font-size:18px; margin:0 0 ${(d.context||d.reviewDate)?'6':'10'}px">${esc(d.statement)}</p>
        ${d.context?`<p class="muted" style="font-size:13.5px;margin:0 0 8px">السياق: ${esc(d.context)}</p>`:""}
        ${d.reviewDate?`<p class="muted" style="font-size:13px;margin:0 0 8px">📅 مراجعة: ${esc(d.reviewDate)}${d.reviewed?' · تمت':''}</p>`:""}
        <div class="actions">
          <span class="pill dot ${d.state==='confirmed'?'':'warn'}" style="${d.state==='confirmed'?'background:var(--accent-soft);color:#7c4b5b':''}">${STATE_AR[d.state]||esc(d.state)} ${d.confirmCount?('· '+d.confirmCount+'/2'):''}</span>
          ${ inResource && d.state!=="confirmed" ? `<button class="btn accent sm" data-act="confirm" data-d="${esc(d.id)}">أؤكّد موافقتي</button>` : (d.state==="confirmed"? `<span class="muted" style="font-size:13px">مؤكَّد من كليكما.</span>`:"") }
          ${ (d.state==="confirmed" && !d.reviewed) ? `<button class="btn ghost sm" data-act="reviewDec" data-d="${esc(d.id)}">تمت المراجعة</button>` : "" }
        </div>
      </div>`;
  }

  async function renderDiscussionsAll(){
    S.view="discussions"; S.resourceId=null;
    el.innerHTML = pageTitle("المناقشات","كل الأسئلة من موادنا في مكان واحد.") + `<div id="dscBody"><div class="empty">…تحميل</div></div>`;
    try{
      const [qs, res] = await Promise.all([api("GET","/questions"), api("GET","/resources")]);
      const titles = Object.fromEntries(res.map(r=>[r.id, r.title]));
      const body=document.getElementById("dscBody");
      if(!qs.length){ body.innerHTML=`<div class="empty">لسه مفيش أسئلة. افتح موردًا وولّد منه أسئلة نقاش.</div>`; return; }
      const byRes={}; qs.forEach(q=>{ (byRes[q.resourceId]=byRes[q.resourceId]||[]).push(q); });

  // ---------- actions ----------
  async function go(act, node){
    try{
      if(act==="authMode"){ S.authMode=node.dataset.m; renderOnboarding(); return; }
      if(act==="togglePw"){ const i=document.getElementById(node.dataset.for); if(i){ i.type = i.type==="password"?"text":"password"; node.textContent = i.type==="password"?"👁️":"🙈"; } return; }
      if(act==="apiedit"){
        const v = prompt("عنوان الخادم (API base):", API());
        if(v){ localStorage.setItem("sakan_api", v.trim().replace(/\/$/,"")); render(); }
        return;
      }
      if(act==="login"){
        const email=(document.getElementById("emailL").value||"").trim();
        const pw=(document.getElementById("pwL").value||"");
        if(!email||!pw) return toast("اكتب الإيميل والباسوورد");
        const out = await api("POST","/login",{ email, password:pw });
        S.token=out.token; S.code=out.pairCode||null; S.name=out.displayName||null; S.email=email; save(); S.view="home"; render();
        toast("أهلًا بيك تاني 🌿"); return;
      }
      if(act==="create"){
        const name = (document.getElementById("nameC").value||"").trim();
        const email=(document.getElementById("emailC").value||"").trim();
        const pw=(document.getElementById("pwC").value||"");
        if(!email||!pw) return toast("اكتب الإيميل والباسوورد");
        const out = await api("POST","/pair",{ email, password:pw, displayName:name||"أنا" });
        S.token=out.token; S.code=out.pairCode; S.name=out.displayName||name; S.email=email; save(); S.view="home"; render();
        toast("تم إنشاء الميثاق — شارك الكود "+out.pairCode); return;
      }
      if(act==="join"){
        const name=(document.getElementById("nameJ").value||"").trim();
        const code=(document.getElementById("codeJ").value||"").trim().toUpperCase();
        const email=(document.getElementById("emailJ").value||"").trim();
        const pw=(document.getElementById("pwJ").value||"");
        if(!code) return toast("أدخل الكود");
        if(!email||!pw) return toast("اكتب الإيميل والباسوورد");
        const out = await api("POST","/pair/join",{ code, email, password:pw, displayName:name||"أنا" });
        S.token=out.token; S.code=out.pairCode||null; S.name=out.displayName||name; S.email=email; save(); S.view="home"; render();
        toast("انضممت إلى الميثاق"); return;
      }
      if(act==="logout") return logout();
      if(act==="library"){ S.view="library"; S.tab="summary"; render(); return; }

      if(act==="setProg"){ await api("PUT","/resources/"+S.resourceId+"/progress",{ status:node.dataset.val }); renderResource(); return; }
      if(act==="setPrio"){ await api("PUT","/resources/"+S.resourceId+"/priority",{ priority:node.dataset.val }); toast("اتحدّثت الأولوية"); renderResource(); return; }
      if(act==="setCat"){ await api("PUT","/resources/"+S.resourceId+"/category",{ category:node.dataset.val }); toast("اتحدّث التصنيف"); renderResource(); return; }
      if(act==="setPlaylist"){ S.playlist=node.dataset.pl; renderJourneys(); return; }

      if(act==="addRes"){
        const title=(document.getElementById("rTitle").value||"").trim();
        if(!title) return toast("اكتب عنوان المورد");
        const link=(document.getElementById("rLink").value||"").trim();
        const summary=(document.getElementById("rSummary").value||"").trim();
        const insights=(document.getElementById("rInsights").value||"").trim();
        const questions=(document.getElementById("rQuestions").value||"").trim();
        const applications=(document.getElementById("rApps").value||"").trim();
        await api("POST","/resources/full",{ title, link:link||null, summary, insights, questions, applications });
        toast("أُضيف المورد ✦"); renderLibrary(); return;
      }
      if(act==="copyPrompt"){ try{ await navigator.clipboard.writeText(NB_PROMPT); toast("اتنسخ البرومت ✦"); }catch(e){ toast("منعرفش ننسخ — حدّده يدوي"); } return; }
      if(act==="copyAppUrl"){ try{ await navigator.clipboard.writeText(APP_URL); toast("اتنسخ رابط التطبيق"); }catch(e){} return; }
      if(act==="importBulk"){
        const lines=(document.getElementById("bulk").value||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
        if(!lines.length) return toast("الصق رابطًا واحدًا على الأقل");
        node.disabled=true; const orig=node.textContent;
        const q=lines.slice(); let done=0, ok=0;
        async function worker(){ while(q.length){ const link=q.shift(); try{ await api("POST","/resources",{ title:titleFromUrl(link), link }); ok++; }catch(e){} done++; node.textContent="…"+done+"/"+lines.length; } }
        await Promise.all(Array.from({length:Math.min(4,lines.length)}, worker));   // 4 at a time → أسرع بكتير
        node.disabled=false; node.textContent=orig;
        toast("تم استيراد "+ok+" من "+lines.length+" — تقدر تعيد تسميتها لاحقًا");
        renderLibrary(); return;
      }
      if(act==="open" || node?.dataset.open){ S.resourceId=node.dataset.open; S.view="resource"; S.tab="summary"; render(); return; }

      if(act==="genSummary"){ await api("POST","/resources/"+S.resourceId+"/summary"); toast("تم توليد الملخص"); renderResource(); return; }
      if(act==="goDiscuss"){ S.tab="discussion"; renderResource(); return; }
      if(act==="genQuestions"){ await api("POST","/resources/"+S.resourceId+"/questions/generate"); toast("تم توليد الأسئلة"); renderResource(); return; }
      if(act==="addQ"){ const txt=(document.getElementById("qNew").value||"").trim(); if(!txt) return toast("اكتب السؤال"); await api("POST","/resources/"+S.resourceId+"/questions",{text:txt}); renderResource(); return; }

      if(act==="saveAns"){
        const q=node.dataset.q; const box=document.querySelector(`.q[data-q="${q}"] .myans`);
        const text=(box.value||"").trim(); if(!text) return toast("اكتب إجابتك");
        await api("PUT","/questions/"+q+"/responses",{text}); toast("حُفظت إجابتك"); renderResource(); return;
      }
      if(act==="reveal"){ await api("POST","/questions/"+node.dataset.q+"/reveal"); toast("انكشفت الإجابتان"); renderResource(); return; }
      if(act==="force"){ if(confirm("الكشف الآن قبل أن يجيب الطرف الآخر؟")){ await api("POST","/questions/"+node.dataset.q+"/force-reveal"); renderResource(); } return; }

      if(act==="createDec"){
        const statement=(document.getElementById("dStmt").value||"").trim();
        if(!statement) return toast("اكتب صياغة القرار");
        const questionIds=[...document.querySelectorAll(".dq:checked")].map(x=>x.value);
        if(!questionIds.length) return toast("اختر سؤالًا واحدًا على الأقل");
        const context=(document.getElementById("dContext").value||"").trim();
        const category=(document.querySelector("#dCat button.on")||{}).dataset?.cat || "general";
        const reviewDate=(document.getElementById("dReview").value||"").trim();
        await api("POST","/decisions",{ resourceId:S.resourceId, statement, questionIds, context:context||null, category, reviewDate:reviewDate||null });
        toast("سُجّل القرار كمسودّة"); renderResource(); return;
      }
      if(act==="confirm"){ await api("POST","/decisions/"+node.dataset.d+"/confirm"); toast("سُجّلت موافقتك"); renderResource(); return; }

      // ---- navigation to new pages ----
      if(act==="home"){ S.view="home"; render(); return; }
      if(act==="journeys"){ S.view="journeys"; render(); return; }
      if(act==="discussions"){ S.view="discussions"; render(); return; }
      if(act==="decisionlog"){ S.view="decisionlog"; render(); return; }
      if(act==="connect"){ S.view="connect"; render(); return; }

      // ---- PIN Lock actions ----
      if(act==="pinKey"){ pinHandleKey(node.dataset.k); return; }
      if(act==="pinWhoSel"){ S.pinWhoSel=node.dataset.w; renderPinLock(); return; }
      if(act==="pinWhoConfirm"){
        const w=S.pinWhoSel; if(!w) return;
        localStorage.setItem(PIN_WHO,w); S.pinWho=w; S.pinWhoSel=null;
        // Check if PIN already set
        if(localStorage.getItem(PIN_KEY)){ S.pinStep="lock"; renderPinLock(); }
        else { S.pinStep="setup1"; S.pinEntry=""; renderPinLock(); }
        return;
      }
      if(act==="pinSkip"){
        // Skip without setting PIN — go straight home
        localStorage.removeItem(PIN_KEY); localStorage.removeItem(PIN_WHO);
        document.body.classList.remove("pre-auth");
        S.pinStep="lock"; S.view="home"; render(); return;
      }
      if(act==="pinForgot"){
        if(!confirm("هتتطلع من الجلسة وتعيد تسجيل الدخول — تكمل؟")) return;
        logout(); return;
      }
      if(act==="clearPin"){
        if(!confirm("هتشيل قفل الـ PIN — أي حد ممسك الموبايل يقدر يدخل. متأكد؟")) return;
        localStorage.removeItem(PIN_KEY); localStorage.removeItem(PIN_WHO);
        S.pinWho=null; toast("اتشال القفل"); renderSettings(); return;
      }
      if(act==="setupPin"){
        // Called from Settings
        S.pinStep="setup1"; S.pinEntry=""; S.pinSetup1="";
        S.view="pinlock"; renderPinLock(); return;
      }
      if(act==="quicknotes"){ S.view="quicknotes"; S.qnPanel="shared"; render(); return; }
      if(act==="qnPanel"){ S.qnPanel=node.dataset.p; renderQuickNotes(); return; }
      if(act==="qnAdd"){ qnDoAdd(node.dataset.scope||"shared"); return; }
      if(act==="qnDel"){ qnDoDel(node.dataset.id, node.dataset.scope||"shared"); return; }
      if(act==="charter"){ S.view="charter"; render(); return; }

      if(act==="addCharter"){ const k=node.dataset.kind; const inp=document.getElementById("ch_"+k); const t=(inp&&inp.value||"").trim(); if(!t) return toast("اكتب حاجة الأول"); await api("POST","/charter",{kind:k,text:t}); renderCharter(); return; }
      if(act==="delCharter"){ await api("POST","/charter/"+node.dataset.id+"/delete"); renderCharter(); return; }
      if(act==="addKey"){ const k=node.dataset.kind; const inp=document.getElementById(k==='soothe'?"keySoothe":"keyAnnoy"); const t=(inp&&inp.value||"").trim(); if(!t) return toast("اكتب مفتاح"); await api("POST","/keys",{kind:k,text:t}); renderConnect(); return; }
      if(act==="delKey"){ await api("POST","/keys/"+node.dataset.id+"/delete"); renderConnect(); return; }
      if(act==="setFocus"){ await api("PUT","/focus",{resourceId:S.resourceId}); toast("بقت مادتنا دلوقتي 📌"); renderResource(); return; }
      if(act==="clearFocus"){ await api("POST","/focus/clear"); renderHome(); return; }
      if(act==="addGratHome"){ const inp=document.getElementById("homeGrat"); const t=(inp&&inp.value||"").trim(); if(!t) return toast("اكتب نعمة"); await api("POST","/gratitude",{text:t}); if(inp) inp.value=""; toast("أضفناها للامتنان 🌿"); return; }

      // ---- phase 5: connection ----
      if(act==="setMood"){ await api("PUT","/mood",{value:node.dataset.v}); renderConnect(); return; }
      if(act==="addWish"){ const t=(document.getElementById("wText").value||"").trim(); if(!t) return toast("اكتب الأمنية"); await api("POST","/wishes",{text:t}); renderConnect(); return; }
      if(act==="toggleWish"){ await api("POST","/wishes/"+node.dataset.id+"/toggle"); renderConnect(); return; }
      if(act==="delWish"){ await api("POST","/wishes/"+node.dataset.id+"/delete"); renderConnect(); return; }
      if(act==="addGrat"){ const t=(document.getElementById("gText").value||"").trim(); if(!t) return toast("اكتب امتنانك"); await api("POST","/gratitude",{text:t}); renderConnect(); return; }
      if(act==="delGrat"){ await api("POST","/gratitude/"+node.dataset.id+"/delete"); renderConnect(); return; }
      if(act==="addCapsule"){ const c=(document.getElementById("capContent").value||"").trim(); if(!c) return toast("اكتب رسالتك"); const d=(document.getElementById("capDate").value||"").trim(); await api("POST","/capsules",{content:c,openDate:d||null}); toast("خُتمت الرسالة"); renderConnect(); return; }
      if(act==="addSafe"){ const topic=(document.getElementById("safeTopic").value||"").trim(); if(!topic) return toast("اكتب الموضوع"); await api("POST","/safespace",{topic,feeling:(document.getElementById("safeFeel").value||"").trim(),need:(document.getElementById("safeNeed").value||"").trim()}); toast("أُضيف للصندوق"); renderConnect(); return; }
      if(act==="safeAddressed"){ await api("POST","/safespace/"+node.dataset.id+"/addressed"); renderConnect(); return; }
      if(act==="seedCurriculum"){ const r=await api("POST","/journey/seed"); toast(r.already? "المنهج مستورد بالفعل" : "تم استيراد "+r.seeded+" موردًا"); renderJourneys(); return; }

      // ---- notes ----
      if(act==="saveSharedNote"){ await api("PUT","/resources/"+S.resourceId+"/notes",{scope:"shared",content:document.getElementById("sharedNote").value}); toast("حُفظت الملاحظة المشتركة"); return; }
      if(act==="savePrivateNote"){ await api("PUT","/resources/"+S.resourceId+"/notes",{scope:"private",content:document.getElementById("privNote").value}); toast("حُفظت ملاحظتك الخاصة"); return; }

      // ---- review a decision ----
      if(act==="reviewDec"){ await api("POST","/decisions/"+node.dataset.d+"/reviewed"); toast("سُجّلت المراجعة"); if(S.view==="resource") renderResource(); else renderDecisionLog(); return; }
      if(act==="tasks"){ S.view="tasks"; render(); return; }
      if(act==="budget"){ S.view="budget"; render(); return; }
      if(act==="shopping"){ S.view="shopping"; render(); return; }
      if(act==="settings"){ S.view="settings"; render(); return; }

      // ---- tasks ----
      if(act==="addTask"){
        const title=(document.getElementById("tTitle").value||"").trim(); if(!title) return toast("اكتب المهمة");
        const owner=(document.querySelector("#tOwner button.on")||{}).dataset?.own || "both";
        const due=(document.getElementById("tDue").value||"").trim();
        await api("POST","/tasks",{title,owner,due:due||null}); toast("أُضيفت المهمة"); renderTasks(); return;
      }
      if(act==="toggleTask"){ await api("POST","/tasks/"+node.dataset.id+"/toggle"); reloadTasks(); return; }
      if(act==="delTask"){ await api("POST","/tasks/"+node.dataset.id+"/delete"); reloadTasks(); return; }

      // ---- budget ----
      if(act==="addBudget"){
        const label=(document.getElementById("bLabel").value||"").trim(); if(!label) return toast("اكتب اسم البند");
        const cat=(document.getElementById("bCat").value||"").trim();
        const planned=parseFloat(document.getElementById("bPlanned").value)||0;
        await api("POST","/budget",{label,cat:cat||null,planned}); toast("أُضيف البند"); renderBudget(); return;
      }
      if(act==="payBudget"){ const amt=parseFloat(prompt("قيمة الدفعة:","0"))||0; if(!amt) return; await api("POST","/budget/"+node.dataset.id+"/pay",{amount:amt}); reloadBudget(); return; }
      if(act==="delBudget"){ await api("POST","/budget/"+node.dataset.id+"/delete"); reloadBudget(); return; }

      // ---- shopping ----
      if(act==="addShop"){ const text=(document.getElementById("sText").value||"").trim(); if(!text) return toast("اكتب الصنف"); await api("POST","/shopping",{text}); renderShopping(); return; }
      if(act==="toggleShop"){ await api("POST","/shopping/"+node.dataset.id+"/toggle"); reloadShopping(); return; }
      if(act==="delShop"){ await api("POST","/shopping/"+node.dataset.id+"/delete"); reloadShopping(); return; }

      // ---- settings: export ----
      if(act==="export"){
        toast("جاري التصدير…");
        const out={ exportedAt:new Date().toISOString() };
        const grab=async(k,path)=>{ try{ out[k]=await api("GET",path); }catch(e){ out[k]=[]; } };
        await Promise.all([grab("resources","/resources"),grab("decisions","/decisions"),grab("tasks","/tasks"),grab("budget","/budget"),grab("shopping","/shopping")]);
        const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
        const link=document.createElement("a"); link.href=URL.createObjectURL(blob); link.download="sakan-export.json"; link.click(); URL.revokeObjectURL(link.href);
        toast("تم التصدير"); return;
      }
    }catch(e){
      if(e.code==="UNAUTHENTICATED"){ toast(errMsg(e)); return logout(); }
      toast(errMsg(e));
    }
  }

  // ---------- events ----------
  document.body.addEventListener("click",(ev)=>{
    const dw = ev.target.closest("[data-dw]");
    if(dw){ ev.preventDefault(); if(dw.dataset.dw==="open") openDrawer(); else closeDrawer(); return; }
    const ds = ev.target.closest("[data-dwsec]");
    if(ds){ ds.classList.toggle("collapsed"); const g=ds.nextElementSibling; if(g) g.classList.toggle("collapsed"); return; }
    const th = ev.target.closest("[data-set-theme]");
    if(th){ applyTheme(th.dataset.setTheme); return; }
    const a = ev.target.closest("[data-act]");
    if(a){ ev.preventDefault(); if(a.closest("#drawer")) closeDrawer(); return go(a.dataset.act, a); }
    const t = ev.target.closest("[data-tab]");
    if(t){ S.tab=t.dataset.tab; renderResource(); return; }
    const open = ev.target.closest("[data-open]");
    if(open){ S.resourceId=open.dataset.open; S.view="resource"; S.tab="summary"; render(); return; }
    const oq = ev.target.closest("[data-openq]");
    if(oq){ S.resourceId=oq.dataset.openq; S.view="resource"; S.tab="discussion"; render(); return; }
    const cat = ev.target.closest("[data-cat]");
    if(cat){ [...cat.parentElement.children].forEach(x=>x.classList.toggle("on", x===cat)); return; }
  });

  document.getElementById("foot").innerHTML = "سكن · مساحتنا إحنا الاتنين — خاصّة بطبيعتها، من غير مشاركة عامة.";
  render();
})();


})();
</script>

<!-- ════ PWA: Service Worker + Install Prompt ════ -->
<script>
(function(){
  'use strict';

  // ── Register Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then(reg => {
          console.log('[سكن] SW registered:', reg.scope);
          // Check for updates every 60s when app is open
          setInterval(() => reg.update(), 60_000);
          reg.addEventListener('updatefound', () => {
            const worker = reg.installing;
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateToast(worker);
              }
            });
          });
        })
        .catch(err => console.warn('[سكن] SW error:', err));

      // When new SW takes over — reload
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    });
  }

  // ── Update toast ──
  function showUpdateToast(worker) {
    const existing = document.getElementById('pwa-update-toast');
    if (existing) return;
    const toast = document.createElement('div');
    toast.id = 'pwa-update-toast';
    toast.style.cssText = [
      'position:fixed;bottom:calc(24px + var(--sab,0px));left:50%;transform:translateX(-50%)',
      'background:linear-gradient(135deg,#1e3a2f,#2a5c42);color:#f4ecd6',
      'border:1px solid rgba(201,161,74,.5);border-radius:16px',
      'padding:12px 20px;font-family:ThmanyahSans,Tajawal,sans-serif;font-size:14px',
      'display:flex;align-items:center;gap:12px;z-index:9999',
      'box-shadow:0 8px 32px rgba(0,0,0,.4);direction:rtl',
    ].join(';');
    toast.innerHTML = `
      <span>🌿 تحديث جديد لسكن جاهز</span>
      <button onclick="this.closest('#pwa-update-toast').remove()" 
        style="background:rgba(255,255,255,.1);border:1px solid rgba(201,161,74,.4);
               color:#e6c97a;border-radius:10px;padding:5px 14px;cursor:pointer;
               font-family:inherit;font-size:13px;font-weight:700">تحديث</button>
    `;
    toast.querySelector('button').addEventListener('click', () => {
      worker.postMessage({ type: 'SKIP_WAITING' });
      toast.remove();
    });
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 12_000);
  }

  // ── Install Prompt (Android Chrome) ──
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  window.addEventListener('appinstalled', () => {
    hideInstallBanner();
    deferredPrompt = null;
    // Small celebration toast
    const t = document.getElementById('toast');
    if (t) { t.textContent = 'سكن اتثبّت على موبايلك 🎉'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
  });

  function showInstallBanner() {
    if (document.getElementById('pwa-install-banner')) return;
    // Don't show if already installed (standalone mode)
    if (window.matchMedia('(display-mode: standalone)').matches) return;
    if (window.navigator.standalone === true) return;

    const banner = document.createElement('div');
    banner.id = 'pwa-install-banner';
    banner.style.cssText = [
      'position:fixed;bottom:calc(16px + var(--sab,0px));left:50%;transform:translateX(-50%)',
      'width:calc(100% - 32px);max-width:420px',
      'background:rgba(10,28,20,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)',
      'border:1px solid rgba(201,161,74,.4);border-radius:20px',
      'padding:16px 18px;display:flex;align-items:center;gap:14px;z-index:9998',
      'box-shadow:0 12px 40px rgba(0,0,0,.5);direction:rtl',
      'animation:slideUp .35s cubic-bezier(.22,.68,0,1.2) both',
    ].join(';');
    banner.innerHTML = `
      <style>@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}</style>
      <img src="/icons/icon-72x72.png" width="48" height="48" style="border-radius:12px;flex:none" alt="سكن">
      <div style="flex:1;min-width:0">
        <div style="color:#fff;font-family:ThmanyahSerifDisplay,serif;font-size:16px;font-weight:700">ثبّت سكن</div>
        <div style="color:rgba(244,236,214,.7);font-size:12.5px;margin-top:2px">على الشاشة الرئيسية زي أي تطبيق</div>
      </div>
      <button id="pwa-install-btn"
        style="background:linear-gradient(135deg,#c9a14a,#e6c97a);color:#1e3a2f;border:none;
               border-radius:12px;padding:10px 16px;font-family:ThmanyahSans,Tajawal,sans-serif;
               font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap">تثبيت</button>
      <button id="pwa-dismiss-btn"
        style="background:none;border:none;color:rgba(244,236,214,.5);cursor:pointer;
               font-size:20px;padding:4px;line-height:1">✕</button>
    `;

    banner.querySelector('#pwa-install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[سكن] Install outcome:', outcome);
      deferredPrompt = null;
      banner.remove();
    });

    banner.querySelector('#pwa-dismiss-btn').addEventListener('click', () => {
      banner.remove();
      // Don't show again for 7 days
      localStorage.setItem('pwa_dismissed', Date.now() + 7*24*60*60*1000);
    });

    // Respect dismiss preference
    const dismissed = parseInt(localStorage.getItem('pwa_dismissed') || '0');
    if (Date.now() < dismissed) return;

    document.body.appendChild(banner);
    // Auto-hide after 15s
    setTimeout(() => banner?.remove(), 15_000);
  }

  function hideInstallBanner() {
    document.getElementById('pwa-install-banner')?.remove();
  }

  // ── iOS Safari install hint ──
  function showIOSHint() {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    const dismissed = parseInt(localStorage.getItem('ios_hint_dismissed') || '0');
    if (!isIOS || isStandalone || Date.now() < dismissed) return;

    const hint = document.createElement('div');
    hint.id = 'pwa-ios-hint';
    hint.style.cssText = [
      'position:fixed;bottom:calc(16px + var(--sab,0px));left:50%;transform:translateX(-50%)',
      'width:calc(100% - 32px);max-width:400px',
      'background:rgba(10,28,20,.92);backdrop-filter:blur(20px)',
      'border:1px solid rgba(201,161,74,.35);border-radius:18px',
      'padding:16px 18px;z-index:9998;direction:rtl',
      'box-shadow:0 12px 40px rgba(0,0,0,.5)',
    ].join(';');
    hint.innerHTML = `
      <div style="color:#f4ecd6;font-family:ThmanyahSans,Tajawal,sans-serif;font-size:14px;font-weight:700;margin-bottom:8px">ثبّت سكن على iPhone</div>
      <div style="color:rgba(244,236,214,.75);font-size:13px;line-height:1.6">
        اضغط على زر المشاركة <span style="font-size:16px">⎋</span> في سفارى
        ثم اختر <b style="color:#e6c97a">«أضف إلى الشاشة الرئيسية»</b>
      </div>
      <button onclick="this.parentElement.remove();localStorage.setItem('ios_hint_dismissed',Date.now()+7*24*60*60*1000)"
        style="margin-top:12px;background:rgba(255,255,255,.1);border:1px solid rgba(201,161,74,.3);
               color:#e6c97a;border-radius:10px;padding:6px 16px;cursor:pointer;
               font-family:inherit;font-size:13px;font-weight:700;width:100%">فهمت 👍</button>
    `;
    document.body.appendChild(hint);
    setTimeout(() => hint?.remove(), 20_000);
  }

  // Show iOS hint after 3s if not installed
  setTimeout(showIOSHint, 3000);

})();
</script>
