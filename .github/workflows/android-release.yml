name: 🤖 Android APK — سكن

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
  workflow_dispatch:        # يدوي من GitHub UI

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      # ── 2. Node.js ──
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # ── 3. Install & Build web assets ──
      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build web (copy assets)
        run: |
          # سكن is a vanilla SPA — copy src/ to www/
          mkdir -p www
          cp -r src/index.html www/
          cp -r src/js         www/js     2>/dev/null || true
          cp -r src/media      www/media  2>/dev/null || true
          cp -r src/icons      www/icons  2>/dev/null || true
          cp -r src/fonts      www/fonts  2>/dev/null || true
          cp src/manifest.json www/       2>/dev/null || true
          cp src/sw.js         www/       2>/dev/null || true
          echo "✅ www/ ready:"
          ls -la www/

      # ── 4. Capacitor sync ──
      - name: ⚡ Capacitor sync
        run: |
          npx cap sync android
        env:
          CI: true

      # ── 5. Java ──
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 6. Android keystore (من GitHub Secrets) ──
      - name: 🔑 Decode keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/sakan.keystore

      # ── 7. Build APK (debug for testing) ──
      - name: 🏗️ Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 8. Build Release AAB (for Play Store) ──
      - name: 🏗️ Build Release AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PATH:     sakan.keystore
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:    ${{ secrets.STORE_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      # ── 9. Upload artifacts ──
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sakan-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: 📤 Upload Release AAB
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sakan-release-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
